const _usedCodes=new Set();

function applyCheatCode(code){
  if(!code||code.length!==5) return{ok:false,msg:'Enter a 5-character code.'};
  if(_usedCodes.has(code)&&code!=='COIN$')
    return{ok:false,msg:'Code already used this session.'};
  const fn=CHEAT_CODES[code];
  if(!fn) return{ok:false,msg:'Unknown code. Try again.'};
  _usedCodes.add(code);
  return fn();
}

// ===================== SPIN WHEEL =====================
function showSpinWheel(){
  // Collect all shop items that haven't been owned yet
  const d=getSave();
  const owned=d.owned||{};
  const spinnable=SHOP_ITEMS.filter(item=>item.category!=='powerup'&&!owned[item.id]);

  if(spinnable.length===0){
    // Already own everything — give coins instead
    const d2=getSave();d2.coins=(d2.coins||0)+50;saveSave(d2);updateCoinHUD();
    showMsg('🎰 SPIN WHEEL<br><br>You already own everything!<br><br><span style="color:#FFDD44">+50 coins instead.</span>',[['NICE',()=>{hideMsg();showSettings();}]]);
    return;
  }

  // Canvas animation — cycle through items fast, slow down, land on one
  const allItems=[...spinnable,...spinnable,...spinnable].slice(0,Math.max(spinnable.length*3,18));
  const finalIdx=Math.floor(Math.random()*spinnable.length);
  // Winner is always spinnable[finalIdx]
  const winner=spinnable[finalIdx];

  const DUR=240; // ~4 seconds
  let displayIdx=0;
  let ticksPerStep=2; // starts fast

  CS={tick:0,duration:DUR,skippable:false,
    draw(){
      const t=this.tick/DUR;
      // Dark background
      ctx.fillStyle='#000814';ctx.fillRect(0,0,CW,CH);
      STARS.forEach(s=>{ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.s*P,s.s*P);});

      // Speed curve — fast in first 60%, slow to stop in last 40%
      if(t<0.6){
        ticksPerStep=Math.max(2,Math.floor(2+t*4));
      } else {
        ticksPerStep=Math.floor(3+(t-0.6)*30);
      }

      // Advance display item
      if(this.tick%ticksPerStep===0){
        if(t<0.9) displayIdx=(displayIdx+1)%spinnable.length;
        else displayIdx=finalIdx; // lock on winner
      }

      const item=spinnable[displayIdx];

      // Title
      ctx.textAlign='center';
      ctx.font='bold 16px monospace';
      ctx.fillStyle='#FFDD44';
      ctx.fillText('🎰 SPIN WHEEL',CW/2,CH*0.18);

      // Spinning item box
      const bx=CW/2-120,by=CH*0.28,bw=240,bh=80;
      // Border pulses gold when landing
      const landing=t>0.88;
      const borderCol=landing?`rgba(255,220,50,${0.5+Math.sin(this.tick*0.4)*0.5})`:'rgba(68,102,170,0.8)';
      ctx.fillStyle='rgba(10,20,40,0.9)';ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=borderCol;ctx.lineWidth=landing?3:2;ctx.strokeRect(bx,by,bw,bh);

      // Category tag
      const catColors={cursor:'#44FFCC',effect:'#FF8844',weapon:'#FFDD00'};
      ctx.font='9px monospace';ctx.fillStyle=catColors[item.category]||'#88AACC';
      ctx.fillText(item.category.toUpperCase(),CW/2,by+16);

      // Item name
      ctx.font='bold 15px monospace';ctx.fillStyle='#FFFFFF';
      ctx.fillText(item.label,CW/2,by+40);

      // Item desc
      ctx.font='10px monospace';ctx.fillStyle='#88AACC';
      ctx.fillText(item.desc,CW/2,by+60);

      // Side arrows
      ctx.font='20px monospace';ctx.fillStyle='rgba(100,150,255,0.5)';
      ctx.fillText('◀',bx-28,by+bh/2+8);ctx.fillText('▶',bx+bw+10,by+bh/2+8);

      // Progress bar
      const barW=200,barX=CW/2-100,barY=CH*0.58;
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(barX,barY,barW,6);
      ctx.fillStyle=landing?'#FFDD44':'#4466AA';
      ctx.fillRect(barX,barY,Math.round(barW*Math.min(t,1)),6);

      // Win flash
      if(t>0.92){
        const flash=(Math.sin(this.tick*0.5)*0.5+0.5)*0.15;
        ctx.fillStyle=`rgba(255,220,50,${flash})`;ctx.fillRect(0,0,CW,CH);
      }

      this.tick++;
      if(this.tick>=DUR) this._award();
    },
    _award(){
      csFinish();
      // Grant the item
      const d2=getSave();
      if(!d2.owned)d2.owned={};
      d2.owned[winner.id]=true;
      d2.equipped[winner.equipped]=winner.val;
      saveSave(d2);
      sndVictory();
      showMsg(
        `🎰 YOU WON!<br><br>`+
        `<b style="color:#FFDD44;font-size:14px">${winner.label}</b><br>`+
        `<span style="color:#88AACC">${winner.desc}</span><br><br>`+
        `<span style="color:#44FF88">Added to your inventory and equipped!</span>`,
        [['AWESOME',()=>{hideMsg();showSettings();}]]
      );
    },
    finish(){this._award();}
  };
}

// ---- Touch support — mirrors mouse/click exactly ----
function getTouchPos(touch){
  canvasRect=canvas.getBoundingClientRect();
  const sx=CW/canvasRect.width,sy=CH/canvasRect.height;
  return{
    x:(touch.clientX-canvasRect.left)*sx,
    y:(touch.clientY-canvasRect.top)*sy
  };
}
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const pos=getTouchPos(e.touches[0]);
  aim.x=pos.x;aim.y=pos.y;
},{passive:false});

  e.preventDefault();

  aim.x=pos.x;aim.y=pos.y;

},{passive:false});

// ===================== AUDIO ENGINE =====================
const AC=(()=>{try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}})();
function resumeAC(){if(AC&&AC.state==='suspended')AC.resume();}
let musicEnabled=true;
let sfxEnabled=true;
function playTone(freq,type,vol,attack,sustain,decay,when){
  if(!AC||!sfxEnabled)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,when||AC.currentTime);
  const t=when||AC.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.setValueAtTime(vol,t+attack+sustain);
  g.gain.linearRampToValueAtTime(0,t+attack+sustain+decay);
  o.start(t);o.stop(t+attack+sustain+decay+0.05);
}
function playNoise(vol,dur,hipass){
  if(!AC||!sfxEnabled)return;
  const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=hipass||400;
  const g=AC.createGain();g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.linearRampToValueAtTime(0,AC.currentTime+dur);
  s.connect(f);f.connect(g);g.connect(AC.destination);
  s.start();
}

let ambientTick=0;
function tickAmbient(bgType){
  if(!sfxEnabled||!AC)return;
  ambientTick++;
  // Fire ambient sounds on specific intervals — vary by bgType
  const t=AC.currentTime;
  if(bgType==='hoth'){
    // Wind gust every ~4 seconds (240 frames)
    if(ambientTick%240===0){
      const buf=AC.createBuffer(1,AC.sampleRate*1.2,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.sin(i/d.length*Math.PI);
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=300;f.Q.value=0.3;
      const g=AC.createGain();g.gain.setValueAtTime(0.08,t);g.gain.linearRampToValueAtTime(0,t+1.2);
      s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
    }
    // Distant Wampa howl every ~8 seconds
    if(ambientTick%480===120){
      [180,160,140,120].forEach((freq,i)=>{
        playTone(freq,'sine',0.04,0.1+i*0.15,0.3,0.4,t+i*0.2);
      });
    }
  } else if(bgType==='rancor'){
    // Cave drip every ~3 seconds
    if(ambientTick%180===0){
      playTone(800+Math.random()*400,'sine',0.06,0.001,0.01,0.15);
    }
    // Deep cave rumble every ~6 seconds
    if(ambientTick%360===90){
      playTone(40,'sine',0.08,0.2,0.4,0.5);
      playTone(60,'sine',0.05,0.2,0.4,0.5);
    }
  } else if(bgType==='desert'){
    // Wind whistle every ~5 seconds
    if(ambientTick%300===0){
      playTone(600+Math.random()*200,'sine',0.03,0.3,0.4,0.5);
      playTone(800+Math.random()*200,'sine',0.02,0.4,0.3,0.4);
    }
  } else if(bgType==='trench'){
    // Death Star alarm beep every ~2 seconds
    if(ambientTick%120===0){
      playTone(440,'square',0.04,0.001,0.05,0.05);
      playTone(440,'square',0.04,0.001,0.05,0.05,t+0.15);
    }
    // Distant explosion rumble every ~7 seconds
    if(ambientTick%420===60){
      const buf=AC.createBuffer(1,AC.sampleRate*0.4,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=120;
      const g=AC.createGain();g.gain.setValueAtTime(0.1,t);g.gain.linearRampToValueAtTime(0,t+0.4);
      s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
    }
  } else if(bgType==='endor'){
    // Forest bird/creature chirp every ~4 seconds
    if(ambientTick%240===0){
      const chirpFreqs=[1200,1600,1400,1800];
      chirpFreqs.forEach((freq,i)=>{
        if(Math.random()>0.5) playTone(freq,'sine',0.04,0.001,0.04,0.08,t+i*0.08);
      });
    }
    // Wind through trees every ~6 seconds
    if(ambientTick%360===180){
      const buf=AC.createBuffer(1,AC.sampleRate*0.8,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.sin(i/d.length*Math.PI)*0.5;
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=500;f.Q.value=0.5;
      const g=AC.createGain();g.gain.setValueAtTime(0.05,t);g.gain.linearRampToValueAtTime(0,t+0.8);
      s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
    }
  } else if(bgType==='coruscant'){
    // Speeder whoosh every ~3 seconds
    if(ambientTick%180===0){
      const freq=800+Math.random()*400;
      playTone(freq,'sawtooth',0.03,0.05,0.1,0.15);
      playTone(freq*0.7,'sawtooth',0.02,0.08,0.08,0.12);
    }
    // City hum constant low drone — every 5 seconds
    if(ambientTick%300===150){
      playTone(60,'sine',0.04,0.2,0.5,0.4);
      playTone(90,'sine',0.03,0.2,0.5,0.4);
    }
  } else if(bgType==='mandalore'){
    // Ember crackle every ~2 seconds
    if(ambientTick%120===0){
      const buf=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*0.5;
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=1000;
      const g=AC.createGain();g.gain.setValueAtTime(0.06,t);
      s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
    }
    // Distant rumble every ~8 seconds
    if(ambientTick%480===240){
      playTone(50,'sine',0.07,0.3,0.6,0.5);
    }
  } else if(bgType==='asteroid'){
    // Debris impact ping every ~4 seconds
    if(ambientTick%240===60){
      playTone(200+Math.random()*100,'sine',0.05,0.001,0.02,0.2);
    }
  }
}

function musicStep(bpm){
  if(!AC||!musicEnabled)return;
  const step=musicTick%16;
  const bar=Math.floor(musicTick/16)%4;
  const bSec=getBeatLen(bpm)/1000;
  const s16=bSec/4;
  const intense=musicPhase==='intense';
  const data=MUSIC_DATA[Math.min(musicLevel,MUSIC_DATA.length-1)];

  // KICK — every beat, extra on step 0
  if(step%4===0){
    playNoise(intense?0.28:0.22,0.07,40);
    playTone(intense?55:60,'sine',intense?0.4:0.3,0.001,0.05,0.09);
    if(step===0) playTone(50,'sine',0.15,0.001,0.07,0.1);
  }
  // Ghost kick when intense
  if(intense&&step===10){playNoise(0.12,0.03,60);playTone(65,'sine',0.18,0.001,0.02,0.05);}

  // SNARE — beats 4 and 12
  if(step===4||step===12){
    playNoise(intense?0.26:0.16,0.08,380);
    playTone(220,'square',intense?0.12:0.08,0.001,0.02,0.05);
    if(intense&&bar===3) playTone(440,'square',0.09,0.001,0.01,0.03);
  }
  if(intense&&(step===6||step===14)) playNoise(0.09,0.04,600);

  // HI-HAT — 16ths, open on offbeats
  playNoise(intense?0.08:0.05,step%2===0?0.025:0.015,step%2===0?3000:6000);
  if(step===2||step===10) playNoise(0.06,0.07,1800);

  // BASS
  const bn=data.bass[step];
  if(bn){
    playTone(bn,'sawtooth',intense?0.3:0.23,0.002,s16*0.75,s16*0.25);
    if(intense) playTone(bn/2,'sine',0.2,0.002,s16*0.8,s16*0.2);
  }

  // CHORD PAD every 4 steps
  if(step%4===0){
    const cn=data.chord[step];
    if(cn){
      const cv=intense?0.08:0.055;
      playTone(cn,      'sine',cv,  0.05,bSec*0.75,bSec*0.25);
      playTone(cn*1.189,'sine',cv*0.7,0.05,bSec*0.75,bSec*0.25);
      playTone(cn*1.498,'sine',cv*0.8,0.05,bSec*0.75,bSec*0.25);
    }
  }

  // LEAD MELODY
  const note=(intense?data.iLead:data.lead)[step];
  if(note){
    playTone(note,intense?'sawtooth':'square',intense?0.15:0.1,0.002,s16*0.6,s16*0.2);
    if(intense&&step%2===0) playTone(note*1.498,'sine',0.055,0.002,s16*0.5,s16*0.15);
  }

  // CRASH into next bar when intense
  if(intense&&bar===3&&step===15){
    playNoise(0.18,0.5,700);
    playTone(880,'sine',0.07,0.01,0.05,0.45);
  }

  musicTick++;
}

// Returns a tinted version of the palette based on hit progress
function getDamageTint(){
  const lv=LEVELS[G.level];
  const pct=G.totalHits/lv.hitsRequired;
  if(pct>=0.75)return 3; // angry palette fully
  if(pct>=0.5) return 2; // mix angry
  if(pct>=0.25)return 1; // slight tint
  return 0;
}
// Override drawSprite to tint based on damage stage
const _origDrawSprite=drawSprite;
function drawSpriteWithDamage(spx,spy,emerge,rumble,angry,sprite,pal,ap){
  if(!angry){
    const stage=getDamageTint();
    if(stage>0){
      // Interpolate palette toward angry colors
      const blend=stage/3;
      const blendedPal=pal.map((c,i)=>{
        if(!c||!ap[i]||i===0)return c;
        const pr=parseInt(c.slice(1,3),16),pg=parseInt(c.slice(3,5),16),pb=parseInt(c.slice(5,7),16);
        const ar=parseInt(ap[i].slice(1,3),16),ag=parseInt(ap[i].slice(3,5),16),ab=parseInt(ap[i].slice(5,7),16);
        const nr=Math.round(pr+(ar-pr)*blend),ng=Math.round(pg+(ag-pg)*blend),nb=Math.round(pb+(ab-pb)*blend);
        return '#'+nr.toString(16).padStart(2,'0')+ng.toString(16).padStart(2,'0')+nb.toString(16).padStart(2,'0');
      });
      _origDrawSprite(spx,spy,emerge,rumble,false,sprite,blendedPal,ap);
      return;
    }
  }
  _origDrawSprite(spx,spy,emerge,rumble,angry,sprite,pal,ap);
}

// ===================== RICOCHET BOLTS (Level 4 asteroid) =====================
function fireBoltRicochet(fx,fy,tx,ty,col){
  // Direction from origin toward aim point
  const dx=tx-fx,dy=ty-fy,len=Math.hypot(dx,dy)||1;
  let cnx=dx/len,cny=dy/len;
  let cx2=fx,cy2=fy;
  const TOTAL_DIST=900; // bolt always travels this far total
  let remaining=TOTAL_DIST;
  const MAX_BOUNCES=4;

  for(let b=0;b<MAX_BOUNCES&&remaining>1;b++){
    // Distance to left or right wall along current direction
    const wallDistX=cnx>0?(CW-cx2)/cnx:cnx<0?(-cx2)/cnx:Infinity;
    // Distance to top or bottom wall
    const wallDistY=cny>0?(CH-cy2)/cny:cny<0?(-cy2)/cny:Infinity;
    const wallDist=Math.min(
      wallDistX>0?wallDistX:Infinity,
      wallDistY>0?wallDistY:Infinity
    );
    const travelDist=Math.min(wallDist, remaining);
    const ex=cx2+cnx*travelDist;
    const ey=cy2+cny*travelDist;

    bolts.push({fx:cx2,fy:cy2,tx:ex,ty:ey,col,p:0,spd:0.09});
    remaining-=travelDist;
    cx2=ex;cy2=ey;

    // Bounce off the wall we hit
    if(wallDistX<=wallDistY&&wallDistX>0){cnx=-cnx;} // left/right wall
    else if(wallDistY<wallDistX&&wallDistY>0){cny=-cny;} // top/bottom wall
    else break;
  }
}
// Also check if a ricochet bolt passes near a spawn point during its travel
function checkRicochetHit(spawnX,spawnCenterY,hitW){
  return bolts.some(b=>{
    for(let t=0;t<=1;t+=0.1){
      const px=b.fx+(b.tx-b.fx)*t;
      const py=b.fy+(b.ty-b.fy)*t;
      const dx=(px-spawnX)/hitW;
      const dy=(py-spawnCenterY)/(hitW*0.8);
      if(dx*dx+dy*dy<1)return true;
    }
    return false;
  });
}

// ===================== SAVE CODE SYSTEM =====================
// Compact array format: [ver, coins, unlocked, diff, ownBits, eqCur, eqEff,
//                        pw_el, pw_ac, pw_dm, pw_th, s0..s9]
// Encodes to ~90 chars prefixed SH1-

const _SC_OWN=['cursor_green','cursor_red','cursor_gold','cursor_rainbow',
               'effect_green','effect_blue','effect_big','effect_disintegrate',
               'powerup_extra','powerup_acc','powerup_dmg','powerup_thermal'];
const _SC_CUR=['default','cursor_green','cursor_red','cursor_gold','cursor_rainbow'];
const _SC_EFF=['sparks','effect_green','effect_blue','effect_big','effect_disintegrate'];
const _SC_DIFF=['easy','normal','hard'];

function generateSaveCode(){
  try{
    const d=getSave();
    const scores=getHighScores();
    const df=Math.max(0,_SC_DIFF.indexOf(d.difficulty||'normal'));
    const ow=d.owned||{};
    const ownBits=_SC_OWN.reduce((acc,k,i)=>acc|(ow[k]?1<<i:0),0);
    const eq=d.equipped||{};
    const eqCur=Math.max(0,_SC_CUR.indexOf(eq.cursor||'default'));
    const eqEff=Math.max(0,_SC_EFF.indexOf(eq.effect||'sparks'));
    const pw=d.powerups||{};
    const arr=[1,
      d.coins||0, highestUnlocked, df, ownBits, eqCur, eqEff,
      pw.extraLife||0, pw.accuracy||0, pw.damage||0, pw.thermal||0,
      ...Array.from({length:10},(_,i)=>scores[i]||0)
    ];
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(arr))))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    return 'SH1-'+b64;
  }catch(e){return null;}
}

function loadSaveCode(code){
  try{
    code=code.trim();
    if(!code.startsWith('SH1-'))return{ok:false,msg:'Invalid code — must start with SH1-'};
    const b64=code.slice(4).replace(/-/g,'+').replace(/_/g,'/');
    const arr=JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!Array.isArray(arr)||arr[0]!==1)return{ok:false,msg:'Unknown code version.'};
    const [,coins,unlocked,df,ownBits,eqCur,eqEff,pwEl,pwAc,pwDm,pwTh,...sc]=arr;
    const d=getSave();
    d.coins=coins||0;
    d.difficulty=_SC_DIFF[df]||'normal';
    d.owned={};_SC_OWN.forEach((k,i)=>{if(ownBits&(1<<i))d.owned[k]=true;});
    d.equipped={cursor:_SC_CUR[eqCur]||'default',effect:_SC_EFF[eqEff]||'sparks'};
    d.powerups={extraLife:pwEl||0,accuracy:pwAc||0,damage:pwDm||0,thermal:pwTh||0};
    saveSave(d);
    const scoreObj={};sc.forEach((v,i)=>{if(v)scoreObj[i]=v;});
    try{localStorage.setItem('spaceHunterScores',JSON.stringify(scoreObj));}catch(e){}
    highestUnlocked=Math.min(Math.max(0,unlocked||0),9);
    const d2=getSave();d2.unlocked=highestUnlocked;saveSave(d2);
    updateCoinHUD();
    return{ok:true,msg:`Loaded! Coins: ${coins}  Levels unlocked: ${(unlocked||0)+1}`};
  }catch(e){return{ok:false,msg:'Could not read code. Check for typos.'};}
}

// Per-bgType hole visuals drawn under the spawn marker label
function drawSpawnHole(sp,bgType){
  const x=sp.x,y=sp.y;
  ctx.save();
  if(bgType==='desert'||bgType==='sarlacc'){
    // Sand burrow hole — dark ellipse with sandy rim
    ctx.fillStyle='rgba(20,10,5,0.7)';
    ctx.beginPath();ctx.ellipse(x,y+3,14,7,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,120,50,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(x,y+3,14,7,0,0,Math.PI*2);ctx.stroke();
    // Sand rim dots
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2;
      ctx.fillStyle='rgba(180,130,60,0.4)';
      ctx.fillRect(x+Math.cos(a)*12-1,y+3+Math.sin(a)*5-1,2,2);
    }
  } else if(bgType==='hoth'){
    // Ice crack hole
    ctx.fillStyle='rgba(10,20,40,0.75)';
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(160,200,240,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.stroke();
    // Ice crack lines
    ctx.strokeStyle='rgba(180,220,255,0.35)';ctx.lineWidth=1;
    [[-10,-4,2,4],[10,-3,-3,5],[0,-6,-6,3],[8,5,-8,-3]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();ctx.moveTo(x+x1,y+y1);ctx.lineTo(x+x2,y+y2);ctx.stroke();
    });
  } else if(bgType==='rancor'){
    // Cave pit — jagged dark hole
    ctx.fillStyle='rgba(5,5,5,0.85)';
    ctx.beginPath();ctx.ellipse(x,y+4,15,7,0,0,Math.PI*2);ctx.fill();
    // Jagged edge
    ctx.strokeStyle='rgba(80,50,20,0.6)';ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2;
      const jitter=(i%2===0)?1.2:0.75;
      if(i===0) ctx.moveTo(x+Math.cos(a)*15*jitter,y+4+Math.sin(a)*7*jitter);
      else ctx.lineTo(x+Math.cos(a)*15*jitter,y+4+Math.sin(a)*7*jitter);
    }
    ctx.closePath();ctx.stroke();
  } else if(bgType==='asteroid'){
    // Crater hole
    ctx.fillStyle='rgba(5,10,5,0.8)';
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(100,160,80,0.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(80,130,60,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(x,y+3,18,8,0,0,Math.PI*2);ctx.stroke();
  } else if(bgType==='trench'){
    // Exhaust vent grid
    ctx.fillStyle='rgba(5,5,15,0.9)';
    ctx.fillRect(x-13,y-3,26,12);
    ctx.strokeStyle='rgba(80,100,140,0.5)';ctx.lineWidth=1;
    ctx.strokeRect(x-13,y-3,26,12);
    for(let gx=-10;gx<=10;gx+=5){
      ctx.beginPath();ctx.moveTo(x+gx,y-3);ctx.lineTo(x+gx,y+9);ctx.stroke();
    }
  } else if(bgType==='endor'){
    // Tree root gap
    ctx.fillStyle='rgba(5,10,5,0.8)';
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(40,80,20,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.stroke();
    // Root tendrils
    ctx.strokeStyle='rgba(60,40,20,0.5)';ctx.lineWidth=2;
    [[-10,-2,-14,-6],[10,-3,14,-7],[0,-6,0,-10],[8,4,12,8],[-8,4,-12,7]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();ctx.moveTo(x+x1,y+y1);ctx.lineTo(x+x2,y+y2);ctx.stroke();
    });
  } else if(bgType==='coruscant'){
    // Tech grid panel vent
    ctx.fillStyle='rgba(0,0,20,0.9)';
    ctx.fillRect(x-13,y-3,26,12);
    ctx.strokeStyle='rgba(40,80,160,0.5)';ctx.lineWidth=1;
    ctx.strokeRect(x-13,y-3,26,12);
    ctx.fillStyle='rgba(40,100,255,0.15)';ctx.fillRect(x-11,y-1,22,8);
    // Corner lights
    [[x-11,y-1],[x+9,y-1],[x-11,y+7],[x+9,y+7]].forEach(([lx,ly])=>{
      ctx.fillStyle='rgba(80,140,255,0.6)';ctx.fillRect(lx,ly,2,2);
    });
  } else if(bgType==='mandalore'){
    // Lava crack hole
    ctx.fillStyle='rgba(10,3,0,0.9)';
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    // Ember glow
    const grad=ctx.createRadialGradient(x,y+3,0,x,y+3,13);
    grad.addColorStop(0,'rgba(220,80,10,0.3)');
    grad.addColorStop(1,'rgba(80,20,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,60,10,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.stroke();
  } else {
    // Default dark hole
    ctx.fillStyle='rgba(10,8,5,0.75)';
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(150,120,60,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(x,y+3,13,6,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}
// ===================== END THEMED SPAWN HOLES =====================

// ===================== MAIN MENU =====================
let mainMenuActive=false;
let mainMenuTick=0;

function showMainMenu(){
  mainMenuActive=true;
  mainMenuTick=0;
  G=freshState(0);
  stopMusic();
  startTitleMusic();
  document.getElementById('lvlbadge').style.display='none';
  document.getElementById('bp').style.display='none';
  document.getElementById('mainmenu').style.display='block';
  document.getElementById('mainmenu-coins').style.display='block';
  document.getElementById('mainmenu-btns').style.display='flex';
  document.getElementById('mainmenu-btns').style.pointerEvents='all';
  document.getElementById('mm-coins').textContent=getCoins();
  document.body.classList.add('menuopen');
  menuOpen=true;
  const bBegin=document.getElementById('mainmenu-begin');
  const bShop=document.getElementById('mainmenu-shop');
  const bSettings=document.getElementById('mainmenu-settings');
  bBegin.onclick=()=>{sndUIClick();hideMainMenu();showLevelSelect();};
  bShop.onclick=()=>{sndUIShop();hideMainMenu();showShop();};
  bSettings.onclick=()=>{sndUINavigate();hideMainMenu();showSettings();};
  // Inject extra buttons below the row if not already there
  let extraRow=document.getElementById('mainmenu-extra');
  if(!extraRow){
    extraRow=document.createElement('div');
    extraRow.id='mainmenu-extra';
    extraRow.style.cssText='display:flex;gap:10px;margin-top:4px;';
    const styles='font-family:monospace;cursor:pointer;letter-spacing:2px;border:2px solid #4466AA;background:#112233;color:#AADDFF;font-size:11px;padding:8px 18px;';
    [['⚔ CAMPAIGN',()=>{sndUIClick();hideMainMenu();startCampaign();}],
     [`★ DAILY${(()=>{const s=getDailyStreak();return s.streak>0?' 🔥'+s.streak:''})()}`,()=>{sndUIClick();hideMainMenu();startDailyChallenge();}],
     ['📖 BESTIARY',()=>{sndUINavigate();hideMainMenu();showBestiary();}],
     ['🏆 SCORES',()=>{sndUINavigate();hideMainMenu();showLeaderboard(null);}]
    ].forEach(([label,fn])=>{
      const b=document.createElement('button');
      b.textContent=label;b.style.cssText=styles;
      b.onmouseenter=()=>b.style.background='#1A3344';
      b.onmouseleave=()=>b.style.background='#112233';
      b.onclick=fn;
      extraRow.appendChild(b);
    });
    document.getElementById('mainmenu-btns').appendChild(extraRow);
  }
}

function hideMainMenu(){
  mainMenuActive=false;
  stopTitleMusic();
  document.getElementById('mainmenu').style.display='none';
  document.getElementById('mainmenu-coins').style.display='none';
  document.getElementById('mainmenu-btns').style.display='none';
  document.getElementById('mainmenu-btns').style.pointerEvents='none';
  document.body.classList.remove('menuopen');
  menuOpen=false;
}

function drawMainMenu(){
  mainMenuTick++;
  const t=mainMenuTick;

  // Deep space background
  ctx.fillStyle='#000008';ctx.fillRect(0,0,CW,CH);

  // Drifting stars — slow parallax
  STARS.forEach((s,i)=>{
    const drift=(t*0.008*(0.5+s.s))%CW;
    const sx=(s.x+drift)%CW;
    ctx.fillStyle=s.c;
    ctx.fillRect(sx,s.y,s.s*P,s.s*P);
  });

  // Subtle nebula clouds
  [[CW*0.2,CH*0.3,120,'rgba(30,20,80,0.18)'],[CW*0.7,CH*0.6,90,'rgba(20,40,80,0.15)'],[CW*0.5,CH*0.2,100,'rgba(40,20,60,0.12)']].forEach(([x,y,r,c])=>{
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  });

  // Planet silhouette bottom-left
  const pA=0.12+Math.sin(t*0.01)*0.03;
  ctx.fillStyle=`rgba(15,10,30,${pA})`;
  ctx.beginPath();ctx.arc(-40,CH+20,180,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(60,40,120,${pA*1.5})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(-40,CH+20,180,0,Math.PI*2);ctx.stroke();

  // Title — SPACE HUNTER
  const titlePulse=0.92+Math.sin(t*0.025)*0.08;
  ctx.save();
  ctx.textAlign='center';

  // Glow layers
  [['rgba(80,120,255,0.15)',32],['rgba(120,160,255,0.10)',28]].forEach(([col,blur])=>{
    ctx.shadowColor=col;ctx.shadowBlur=blur;
    ctx.fillStyle=col;
    ctx.font=`bold ${Math.round(54*titlePulse)}px monospace`;
    ctx.fillText('SPACE HUNTER',CW/2,CH*0.28);
  });
  ctx.shadowBlur=0;

  // Main title text
  ctx.font=`bold ${Math.round(54*titlePulse)}px monospace`;
  const tg=ctx.createLinearGradient(CW/2-200,0,CW/2+200,0);
  tg.addColorStop(0,'#88AAFF');tg.addColorStop(0.5,'#FFFFFF');tg.addColorStop(1,'#88AAFF');
  ctx.fillStyle=tg;
  ctx.fillText('SPACE HUNTER',CW/2,CH*0.28);

  // Subtitle
  ctx.font='12px monospace';
  ctx.fillStyle=`rgba(150,180,255,${0.6+Math.sin(t*0.02)*0.2})`;
  ctx.fillText('HUNT ALL 10 CREATURES — SAVE THE GALAXY',CW/2,CH*0.38);

  // Decorative line under subtitle
  const lineA=0.3+Math.sin(t*0.015)*0.1;
  ctx.strokeStyle=`rgba(80,120,255,${lineA})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CW/2-160,CH*0.42);ctx.lineTo(CW/2+160,CH*0.42);ctx.stroke();

  ctx.restore();
}
// ===================== END MAIN MENU =====================
const WASD_SPEED=7;
function loop(){
  if(keys['w']||keys['arrowup'])   aim.y=Math.max(0,aim.y-WASD_SPEED);
  if(keys['s']||keys['arrowdown']) aim.y=Math.min(CH,aim.y+WASD_SPEED);
  if(keys['a']||keys['arrowleft']) aim.x=Math.max(0,aim.x-WASD_SPEED);
  if(keys['d']||keys['arrowright'])aim.x=Math.min(CW,aim.x+WASD_SPEED);

  if(CS){
    ctx.clearRect(0,0,CW,CH);
    CS.draw();
    requestAnimationFrame(loop);
    return;
  }
  if(mainMenuActive){
    drawMainMenu();
    requestAnimationFrame(loop);
    return;
  }
  updateBolts();ctx.clearRect(0,0,CW,CH);
  const shk=G.shake>.5?G.shake:0;if(G.shake>0)G.shake*=.8;
  const lv=LEVELS[G.level],bg=lv.bgType;
  if(bg==='hoth'){drawBgHoth(shk);updateDrawSnow();}
  else if(bg==='rancor'){drawBgRancor(shk);updateDrawDrips();}
  else if(bg==='asteroid'){drawBgAsteroid();updateDrawDebris();}
  else if(bg==='mandalore'){drawBgMandalore(shk);}
  else if(bg==='trench')drawBgTrench();
  else if(bg==='endor'){drawBgEndor(shk);}
  else if(bg==='coruscant'){drawBgCoruscant(shk);}
  else{drawBgDesert(shk);updateDrawDust();}

  drawZones(G.highlightZone,bg);drawSpawnMarkers(G.phase==='bomb_place',G.phase==='bomb_place'?G.bombZone:-1,bg);
  if(bg==='trench') drawExhaustPort();

  if(G.activeSpawn>=0){
    const sp=SPAWNS[G.activeSpawn],sp2=G.activeSpawn2>=0?SPAWNS[G.activeSpawn2]:null;
    const angry=G.angryFlash>0;if(G.angryFlash>0)G.angryFlash--;
    const[sprite,pal,ap]=getSprite(lv.enemyType);
    if(G.phase==='rumble'){G.rumbleTick--;const frac=1-G.rumbleTick/getSpeed(120);drawRumble(sp,frac,bg);if(sp2)drawRumble(sp2,frac,bg);drawSpriteWithDamage(sp.x,sp.y,0,true,false,sprite,pal,ap);if(sp2)drawSpriteWithDamage(sp2.x,sp2.y,0,true,false,sprite,pal,ap);if(G.rumbleTick<=0){G.phase='exposed';G.exposeTick=getSpeed(220);G.emerge=0;G.emerge2=0;if(!G.bombActive)G.locked=false;}}
    if(G.phase==='exposed'){if(!G.locked)G.exposeTick--;G.emerge=Math.min(1,G.emerge+.045);if(sp2)G.emerge2=Math.min(1,G.emerge2+.045);drawSpriteWithDamage(sp.x,sp.y,G.emerge,false,angry,sprite,pal,ap);if(sp2)drawSpriteWithDamage(sp2.x,sp2.y,G.emerge2,false,angry,sprite,pal,ap);if(G.exposeTick<=0&&!G.locked&&G.phase==='exposed'){G.shotsThisRound=0;updateHUD();beginRetreat(()=>doLose('TOO SLOW. TARGET VANISHED.'));}}
    if(G.phase==='retreating'){G.retreatTick--;const e=Math.max(0,G.retreatTick/getSpeed(55));drawSpriteWithDamage(sp.x,sp.y,e,false,false,sprite,pal,ap);if(sp2)drawSpriteWithDamage(sp2.x,sp2.y,e,false,false,sprite,pal,ap);if(G.retreatTick<=0){G.phase='idle';if(G._afterRetreat){const f=G._afterRetreat;G._afterRetreat=null;f();}}}
  }
  G.particles=G.particles.filter(p=>p.life>0);G.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.03;});G.particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(Math.round(p.x/P)*P,Math.round(p.y/P)*P,p.r,p.r);});ctx.globalAlpha=1;
  drawBolts();
  drawTimerBar();
  if(G.phase==='exposed') tickAmbient(bg);
  drawCombo();
  drawFloatTexts();
  if(G.flash>0){ctx.fillStyle=G.flashCol;ctx.globalAlpha=G.flash*.7;ctx.fillRect(0,0,CW,CH);ctx.globalAlpha=1;G.flash-=.05;if(G.flash<0)G.flash=0;}
  const wt=lv.weaponType;
  drawWeapon(aim.x,aim.y,wt);
  drawCrosshair(Math.round(aim.x),Math.round(aim.y),getCursorColor(lv.crosshairColor));
  requestAnimationFrame(loop);
}
loop();updateCoinHUD();loadHighestUnlocked();showMainMenu();

// Bottom-left reset button
