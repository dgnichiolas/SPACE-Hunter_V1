<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace;}
#gc{position:fixed;top:0;left:0;width:100%;height:100%;user-select:none;}
canvas{display:block;cursor:none;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}
body.menuopen,body.menuopen canvas{cursor:default !important;}
#ui{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;z-index:10;}
.sb{background:rgba(0,0,32,0.88);border:2px solid #4466AA;color:#88AAFF;font-family:monospace;font-size:11px;padding:4px 10px;letter-spacing:1px;}
.sb span{color:#FFF;font-weight:bold;font-size:13px;}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000818;border:2px solid #4466AA;color:#88CCFF;font-family:monospace;font-size:13px;padding:20px 28px;text-align:center;z-index:9999;display:none;width:92%;max-width:340px;max-height:88vh;overflow-y:auto;overflow-x:hidden;line-height:1.8;pointer-events:all;letter-spacing:1px;cursor:default;-webkit-overflow-scrolling:touch;box-sizing:border-box;}
#msg button{margin-top:8px;background:#223366;color:#FFF;border:2px solid #4466AA;padding:7px 20px;font-size:12px;cursor:pointer;font-family:monospace;display:block;width:100%;letter-spacing:2px;margin-bottom:2px;}
#msg button:hover{background:#334477;}
#msg button.locked{background:#111122;color:#445566;border-color:#223344;cursor:not-allowed;}
#bp{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);background:#000818;border:2px solid #FF4400;color:#FF8800;font-family:monospace;font-size:11px;padding:6px 16px;text-align:center;z-index:20;display:none;pointer-events:none;white-space:nowrap;letter-spacing:1px;}
#hitbar{position:absolute;bottom:8px;left:8px;right:8px;display:flex;align-items:center;gap:8px;pointer-events:none;z-index:10;}
#hitbar span{color:#88AAFF;font-family:monospace;font-size:10px;white-space:nowrap;letter-spacing:1px;}
#hbtrack{flex:1;height:8px;background:#000818;border:2px solid #4466AA;overflow:hidden;}
#hbfill{height:100%;background:#CC2200;transition:width 0.2s;}
#shotpips{position:absolute;top:42px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;z-index:10;}
.pip{width:12px;height:12px;border:2px solid #4466AA;background:#FFDD44;}
.pip.used{background:#000818;}
#lvlbadge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,32,0.88);border:2px solid #4466AA;color:#FFDD44;font-family:monospace;font-size:11px;padding:4px 14px;letter-spacing:2px;pointer-events:none;z-index:10;display:none;}
#wasd{position:absolute;bottom:44px;right:8px;color:rgba(136,170,255,0.35);font-family:monospace;font-size:9px;pointer-events:none;z-index:10;text-align:right;letter-spacing:1px;line-height:1.6;}
#mainmenu{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:500;pointer-events:none;}
#mainmenu-coins{position:fixed;top:10px;right:14px;background:rgba(0,0,32,0.88);border:2px solid #4466AA;color:#FFDD44;font-family:monospace;font-size:13px;padding:5px 14px;letter-spacing:1px;z-index:600;display:none;pointer-events:none;}
#mainmenu-btns{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:10px;z-index:600;}
#mainmenu-btns button{font-family:monospace;cursor:pointer;letter-spacing:2px;border:2px solid #4466AA;}
#mainmenu-begin{background:#1A3A88;color:#FFFFFF;font-size:18px;padding:16px 48px;border-color:#6699FF !important;}

#mainmenu-row{display:flex;gap:12px;}
#mainmenu-row button{background:#112233;color:#AADDFF;font-size:12px;padding:9px 28px;}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  // Only block arrow key page scroll — never block Space/Enter so buttons stay clickable
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(e.code.toLowerCase()))e.preventDefault();
});

let bolts=[];
function clearBolts(){bolts=[];}
function fireBolt(fx,fy,tx,ty,col){bolts.push({fx,fy,tx,ty,col,p:0,spd:0.15});}
function updateBolts(){bolts=bolts.filter(b=>b.p<1.0);bolts.forEach(b=>{b.p=Math.min(1,b.p+b.spd);});}
function drawBolts(){
  bolts.forEach(b=>{
    const x=b.fx+(b.tx-b.fx)*b.p,y=b.fy+(b.ty-b.fy)*b.p;
    const tx2=b.fx+(b.tx-b.fx)*Math.max(0,b.p-0.2),ty2=b.fy+(b.ty-b.fy)*Math.max(0,b.p-0.2);
    ctx.save();ctx.globalAlpha=0.9;ctx.strokeStyle=b.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(x,y);ctx.stroke();
    ctx.fillStyle=b.col;ctx.globalAlpha=1;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawFalconTurret(ax,ay){

  ctx.restore();
}
function drawExhaustPort(){
  // Death Star exhaust port — hexagon at center of screen, glowing green
  const ex=CW/2, ey=CH/2;
  const r=14, sides=6;
  // Outer glow
  ctx.fillStyle='rgba(80,255,80,0.12)';
  ctx.beginPath();
  for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2-Math.PI/6;ctx.lineTo(ex+Math.cos(a)*(r+8),ey+Math.sin(a)*(r+8));}
  ctx.closePath();ctx.fill();
  // Hex body
  ctx.fillStyle='#1A2A1A';
  ctx.beginPath();
  for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2-Math.PI/6;ctx.lineTo(ex+Math.cos(a)*r,ey+Math.sin(a)*r);}
  ctx.closePath();ctx.fill();
  // Inner ring
  ctx.strokeStyle='#448844';ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2-Math.PI/6;ctx.lineTo(ex+Math.cos(a)*r,ey+Math.sin(a)*r);}
  ctx.closePath();ctx.stroke();
  // Inner hex glow
  ctx.fillStyle='rgba(60,200,60,0.25)';
  ctx.beginPath();
  for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2-Math.PI/6;ctx.lineTo(ex+Math.cos(a)*(r*0.55),ey+Math.sin(a)*(r*0.55));}
  ctx.closePath();ctx.fill();
  // Center dot
  ctx.fillStyle='#88FF88';
  ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
  // Label
  ctx.fillStyle='rgba(100,220,100,0.7)';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText('EXHAUST PORT',ex,ey+r+12);
}

function drawCrosshair(x,y,col){
  ctx.fillStyle=col||'#44FFCC';
  [[-P,-(P*4)],[0,-(P*3)],[P,-(P*4)],[-P*2,-(P*6)],[P*2,-(P*6)],[-P*2,-(P*7)],[P*2,-(P*7)],[-P*5,-P*2],[-P*5,-P],[-P*5,0],[-P*5,P],[P*4,-P*2],[P*4,-P],[P*4,0],[P*4,P],[-P,-P*4],[0,-P*4],[P,-P*4],[-P,P*3],[0,P*3],[P,P*3],[0,0]].forEach(([dx,dy])=>ctx.fillRect(x+dx,y+dy,P,P));
}

function drawSprite(spx,spy,emerge,rumble,angry,sprite,pal,ap){
  const rows=sprite.length,cols=sprite[0].length,totalH=rows*P;
  const shown=Math.floor(Math.min(1,emerge)*rows);if(shown<=0)return;
  const rx=rumble?(Math.round((Math.random()-.5)*2))*P:0,ry=rumble?(Math.round((Math.random()-.5)))*P:0;
  const ox=Math.round(spx-(cols*P)/2)+rx,p=angry?ap:pal;
  ctx.save();ctx.beginPath();ctx.rect(ox-P,spy-totalH-P*2,cols*P+P*2,totalH+P*3);ctx.clip();
  for(let row=0;row<shown;row++){const src=(rows-shown)+row;for(let col=0;col<cols;col++){const v=sprite[src][col];if(!v)continue;ctx.fillStyle=p[v];ctx.fillRect(ox+col*P,spy-(shown-row)*P+ry,P,P);}}
  ctx.restore();
}
function getSprite(et){
  if(et==='wampa')return[WS,WP,WA];if(et==='rancor')return[RS,RP,RA];
  if(et==='slug')return[SS,SP,SA];if(et==='turret')return[TSS,TP,TA];
  if(et==='sarlacc')return[SARL_S,SARL_P,SARL_A];
  if(et==='atst')return[ATST_S,ATST_P,ATST_A];
  if(et==='atat')return[ATAT_S,ATAT_P,ATAT_A];
  if(et==='mythosaur')return[MYTH_S,MYTH_P,MYTH_A];
  if(et==='zillo')return[ZILL_S,ZILL_P,ZILL_A];
  return[KS,KP,KA];
}

function drawWeapon(ax,ay,wt){
  const skin=getSave().equipped.wskin||'default';

  // Plasma: bolt color already handles the visual — draw weapon normally, no screen tint
  if(skin==='default'||skin==='plasma'){
    if(wt==='mando') drawMandoRifle(ax,ay);
    else if(wt==='falcon') drawFalconTurret(ax,ay);
    else if(wt==='xwing') drawXWingCannons(ax,ay);
    return;
  }

  const tints={
    gold:  'rgba(255,200,0,0.5)',
    dark:  'rgba(200,0,0,0.55)',
    beskar:'rgba(210,235,255,0.45)',
  };
  const tint=tints[skin];
  if(!tint){
    if(wt==='mando') drawMandoRifle(ax,ay);
    else if(wt==='falcon') drawFalconTurret(ax,ay);
    else if(wt==='xwing') drawXWingCannons(ax,ay);
    return;
  }

  // Draw weapon on blank offscreen canvas (black = transparent after we use it)
  const oc=document.createElement('canvas');
  oc.width=CW;oc.height=CH;
  const oc2=oc.getContext('2d');
  oc2.imageSmoothingEnabled=false;

  // Temporarily redirect all ctx calls to oc2 by swapping the global
  const mainCtx=ctx;
  ctx=oc2; // weapon draw functions all reference the global ctx
  if(wt==='mando') drawMandoRifle(ax,ay);
  else if(wt==='falcon') drawFalconTurret(ax,ay);
  else if(wt==='xwing') drawXWingCannons(ax,ay);
  ctx=mainCtx; // restore

  // Apply tint to weapon pixels only — source-atop affects only drawn pixels
  oc2.save();
  oc2.globalCompositeOperation='source-atop';
  oc2.fillStyle=tint;
  oc2.fillRect(0,0,CW,CH);
  oc2.globalCompositeOperation='source-over';
  oc2.restore();

  // Blit tinted weapon onto main canvas
  ctx.drawImage(oc,0,0);
}

function pickNewSpawn(avoidList){
  // avoidList is an array of spawn indices to exclude
  const available=SPAWNS.map((_,i)=>i).filter(i=>!avoidList.includes(i));
  // fallback: if somehow all are excluded just pick any
  if(available.length===0)return Math.floor(Math.random()*SPAWNS.length);

function doShoot(){
  if(G.phase!=='exposed'||G.locked||G.shotsThisRound<=0)return;
  resumeAC();
  G.shotsThisRound--;G.roundShots++;updateHUD();
  const skin=getSave().equipped.wskin||'default';
  const lv=LEVELS[G.level],boltCol=skin==='plasma'?'#AA44FF':skin==='dark'?'#FF2222':skin==='gold'?'#FFCC00':lv.weaponType==='xwing'?'#FF3333':lv.weaponType==='mando'?'#44FFAA':'#AAFFAA';
  // Ricochet: always on asteroid, only when two targets on trench
  const useRicochet=lv.bgType==='asteroid'||(lv.bgType==='trench'&&G.twoTargets);
  if(useRicochet){
    getFireOrigins(lv.weaponType).forEach(o=>fireBoltRicochet(o.x,o.y,aim.x,aim.y,boltCol));
  } else {
    getFireOrigins(lv.weaponType).forEach(o=>fireBolt(o.x,o.y,aim.x,aim.y,boltCol));
  }
  sndShot();
  let hit=false;
  [G.activeSpawn,G.activeSpawn2].forEach(idx=>{
    if(idx<0)return;
    const sp=SPAWNS[idx];
    const [sprite]=getSprite(lv.enemyType);
    const spriteH=sprite.length*P;
    const spriteW=sprite[0].length*P;
    // For the turret the barrel is at the top — shift center upward
    const centerShift=lv.enemyType==='turret'?spriteH*0.18:0;
    const spriteCenterY=sp.y-spriteH*0.5-centerShift;
    const hitW=Math.max(spriteW*0.6, getHitRadius());
    // Turret needs a taller hit zone to cover the full barrel length
    const hitH=lv.enemyType==='turret'?spriteH*0.9:spriteH*0.72;
    const dx=(aim.x-sp.x)/hitW;
    const dy=(aim.y-spriteCenterY)/hitH;
    const directHit=(dx*dx+dy*dy)<1;
    const ricoHit=useRicochet?checkRicochetHit(sp.x,spriteCenterY,hitW):false;
    if(directHit||ricoHit)hit=true;
  });
  if(hit){
    G.roundHits++;
    const dmg=getHitDamage();
    G.totalHits=Math.min(G.totalHits+dmg, lv.hitsRequired);
    G.shake=10;G.angryFlash=20;

    // Floating hit text
    const hitLabel=dmg>1?'+'+dmg+' DMG':'+1';
    const hitCol=comboCount>=5?'#FF4400':comboCount>=3?'#FFAA00':'#FFFFFF';
    addFloatText(SPAWNS[G.activeSpawn].x,SPAWNS[G.activeSpawn].y-60,hitLabel,hitCol);
    if(comboCount>=2)addFloatText(SPAWNS[G.activeSpawn].x,SPAWNS[G.activeSpawn].y-80,'COMBO x'+comboCount,'#FFDD44');
    updateHUD();
    if(G.totalHits>=lv.hitsRequired){
      G.bombsUsed++;updateHUD();sndBombEarned();
      setTimeout(()=>{beginRetreat(()=>{
        const wn=lv.enemyType==='turret'?'PROTON TORPEDO':lv.enemyType==='slug'?'SEISMIC CHARGE':'BOMB';
        // Thermal detonator powerup — auto-win bomb phase
        if(sessionPowerups.thermal){
          G.flash=1;G.flashCol='rgba(255,180,0,.95)';G.shake=22;
          addParticles(CW/2,CH/2,'#FF2200',60);addParticles(CW/2,CH/2,'#FFDD00',40);addParticles(CW/2,CH/2,'#FF8800',40);
          clearBolts();
          showMsg('** THERMAL DETONATOR **<br><br><span style="color:#FFDD44">AUTO-DETONATION!</span><br>The target is obliterated.',[['CONTINUE',()=>setTimeout(doWin,300)]]);
          return;

        // Level 5: bypass zone system entirely — go straight to exhaust port
        if(G.level===4){
          showMsg('** PROTON TORPEDO ARMED **<br><br>Shields down.<br><br><span style="color:#88FF88;font-size:14px">TARGET THE EXHAUST PORT!</span><br><br>Click the glowing hexagon in the center.',[['AIM FOR PORT',()=>{G.phase='bomb_place';G.totalHits=0;updateHUD();document.getElementById('bp').style.display='block';document.getElementById('bp').textContent='>> CLICK THE EXHAUST PORT';}]]);
          return;
        }
        const dz=Math.floor(Math.random()*3);G.bombZone=dz;G.highlightZone=dz;const wnLabel='PLACE '+wn;
        showMsg('** '+wn+' EARNED **<br><br>Target damaged.<br><br>Will surface in<br><span style="color:#FFDD44;font-size:15px">'+ZONE_NAMES[dz]+' ZONE</span><br><br>Choose one hole. Used: '+G.bombsUsed+'/3',[[wnLabel,()=>{G.phase='bomb_place';G.totalHits=0;updateHUD();document.getElementById('bp').style.display='block';document.getElementById('bp').textContent='>> '+wn+' IN '+ZONE_NAMES[dz]+' ZONE';}]]);
      });},200);
    } else {setTimeout(()=>beginRetreat(()=>{
      startRound();
    }),200);}
  } else {
    comboCount=0;

// ---- Shared helpers ----
function csAddParticles(arr,x,y,cols,n,speed){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=speed*(0.5+Math.random());
    arr.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-speed*0.6,life:1,
      col:cols[Math.floor(Math.random()*cols.length)],r:P+(Math.random()>0.4?P:0)});
  }
}
function csDrawParticles(arr){
  arr.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.025;});
  arr.filter(p=>p.life>0).forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.fillRect(Math.round(p.x/P)*P,Math.round(p.y/P)*P,p.r,p.r);
  });
  ctx.globalAlpha=1;
  return arr.filter(p=>p.life>0);
}
function csDrawTitle(levelIdx,alpha){

}

// ---- INTRO CUTSCENES ----

// L1 & L4: creature arcs out of background, dives into ground
function csIntroArc(levelIdx,onDone){
  const lv=LEVELS[levelIdx];
  const [sprite,pal]=getSprite(lv.enemyType);
  const DUR=280;
  // Arc: starts top-left behind mountains, peaks center-top, dives center-ground
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      if(lv.bgType==='asteroid')drawBgAsteroid();else if(lv.bgType==='hoth')drawBgHoth(0);else if(lv.bgType==='endor')drawBgEndor(0);else if(lv.bgType==='mandalore')drawBgMandalore(0);else if(lv.bgType==='coruscant')drawBgCoruscant(0);else drawBgDesert(0);

      // Arc path: parametric, creature flies from left mountain across sky into sand
      // Phase 0-0.55: flying arc
      // Phase 0.55-0.75: dive into sand + splash
      // Phase 0.75-1.0: title + skip
      const cx=CW/2,groundY=CH*0.54;
      if(t<0.55){
        const ft=t/0.55; // 0→1 during flight
        // Bezier arc: start=(60,CH*0.35) control=(CW/2,CH*-0.1) end=(CW/2,groundY)
        const startX=60,startY=CH*0.38,ctrlX=CW*0.5,ctrlY=-30,endX=CW/2,endY=groundY-60;
        const bx=(1-ft)*(1-ft)*startX+2*(1-ft)*ft*ctrlX+ft*ft*endX;
        const by=(1-ft)*(1-ft)*startY+2*(1-ft)*ft*ctrlY+ft*ft*endY;
        // rotate creature to follow arc direction
        const dx2=2*(-(1-ft)*startX+(1-2*ft)*ctrlX+ft*endX);
        const dy2=2*(-(1-ft)*startY+(1-2*ft)*ctrlY+ft*endY);
        const ang=Math.atan2(dy2,dx2);
        ctx.save();ctx.translate(bx,by);ctx.rotate(ang+Math.PI/2);
        // draw full sprite rotated
        const rows=sprite.length,cols=sprite[0].length;
        const ox=-(cols*P)/2,oy=-(rows*P);
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,oy+r*P,P,P);
        }
        ctx.restore();
        // Speed trail
        if(this.tick%3===0)csAddParticles(this.particles,bx,by,['#C86820','#A05010'],3,2);
      } else if(t<0.75){
        const dt=(t-0.55)/0.2;
        // Dive: creature slams into ground — splash particles
        if(dt<0.3&&this.tick%2===0)
          csAddParticles(this.particles,cx,groundY,['#C86820','#E08030','#AA4010'],8,5);
        // Show emerging briefly then sinking
        const em=Math.max(0,0.4-dt*1.5);
        if(em>0)drawSprite(cx,groundY,em,false,false,sprite,pal,pal);
        // Ground impact ring
        const ringR=dt*80;const ringA=Math.max(0,0.6-dt*2);
        ctx.strokeStyle=`rgba(200,120,50,${ringA})`;ctx.lineWidth=3;
        ctx.beginPath();ctx.ellipse(cx,groundY,ringR,ringR*0.3,0,0,Math.PI*2);ctx.stroke();
      }
      this.particles=csDrawParticles(this.particles);
      // Fade in dark overlay then title
      if(t>0.6){
        const fo=Math.min(0.7,(t-0.6)*3.5);
        ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);
      }
      if(t>0.75)csDrawTitle(levelIdx,Math.min(1,(t-0.75)/0.15));
      if(t>0.85)csDrawSkip(Math.min(0.5,(t-0.85)*5));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L2 Wampa: emerges from cave opening in ice wall
function csIntroWampa(levelIdx,onDone){
  const [sprite,pal]=getSprite('wampa');
  const DUR=270;
  CS={tick:0,duration:DUR,onDone,
    draw(){
      const t=this.tick/DUR;
      drawBgHoth(0);
      // Draw cave opening — dark arch in left wall area
      const caveX=180,caveY=CH*0.62,caveW=120,caveH=140;
      ctx.fillStyle='#0A0C10';
      ctx.beginPath();ctx.ellipse(caveX,caveY,caveW/2,caveH/2,0,0,Math.PI*2);ctx.fill();
      // Cave edge — icy rock rim
      ctx.strokeStyle='#3A5A70';ctx.lineWidth=6;
      ctx.beginPath();ctx.ellipse(caveX,caveY,caveW/2,caveH/2,0,Math.PI,0);ctx.stroke();
      ctx.strokeStyle='#4A6A80';ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(caveX,caveY,caveW/2+6,caveH/2+6,0,Math.PI,0);ctx.stroke();

      // Wampa walks out of cave — starts small (in distance) grows to full size
      // Phase 0-0.5: walks forward out of cave
      // Phase 0.5-0.7: stands up in foreground
      // Phase 0.7-1.0: title
      if(t<0.5){
        const wt=t/0.5;
        // Position: moves from caveX toward center, scales up
        const ex=caveX+(CW/2-caveX)*wt;
        const ey=CH*0.62-(CH*0.62-CH*0.54)*wt;
        const scale=0.3+wt*0.7;
        ctx.save();ctx.translate(ex,ey);ctx.scale(scale,scale);
        const rows=sprite.length,cols=sprite[0].length;
        const ox=-(cols*P)/2;
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,-rows*P+r*P,P,P);
        }
        ctx.restore();
        // Breath mist
        if(this.tick%6===0){
          ctx.fillStyle=`rgba(200,220,240,0.25)`;
          ctx.beginPath();ctx.ellipse(ex+10,ey-20,12,8,0,0,Math.PI*2);ctx.fill();
        }
      } else {
        drawSprite(CW/2,CH*0.54,1,false,false,sprite,pal,pal);
      }
      if(t>0.6){const fo=Math.min(0.65,(t-0.6)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.72)csDrawTitle(levelIdx,Math.min(1,(t-0.72)/0.15));
      if(t>0.85)csDrawSkip(Math.min(0.5,(t-0.85)*5));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L3 Rancor: gate rises, rancor crawls out
function csIntroRancor(levelIdx,onDone){
  const [sprite,pal]=getSprite('rancor');
  const DUR=300;
  CS={tick:0,duration:DUR,onDone,
    draw(){
      const t=this.tick/DUR;
      drawBgRancor(0);
      const gateX=CW/2,gateW=200,gateH=160,gateBaseY=CH*0.58;

      // Phase 0-0.35: gate is closed, ominous rumble
      // Phase 0.35-0.6: gate rises up
      // Phase 0.6-0.78: rancor crawls out
      // Phase 0.78-1.0: title

      const gateRise=Math.min(1,Math.max(0,(t-0.35)/0.25));
      const gateTopY=gateBaseY-gateH+gateRise*gateH; // rises up to reveal opening

      // Draw gate (pixelated bars)
      ctx.save();
      // Gate opening (darkness behind)
      ctx.fillStyle='#050302';
      ctx.fillRect(gateX-gateW/2,gateBaseY-gateH,gateW,gateH);
      // Gate bars
      const barCount=7;
      for(let b=0;b<barCount;b++){
        const bx=gateX-gateW/2+b*(gateW/barCount);
        const barH=gateBaseY-gateTopY;
        ctx.fillStyle=b%2===0?'#4A3A28':'#3A2A18';
        ctx.fillRect(bx,gateTopY,gateW/barCount-3,barH);
        // Metal rivets
        ctx.fillStyle='#8A7A60';
        [0.25,0.75].forEach(ry=>ctx.fillRect(bx+4,gateTopY+barH*ry-3,6,6));
      }
      // Gate top bar
      ctx.fillStyle='#5A4A30';
      ctx.fillRect(gateX-gateW/2-8,gateTopY-12,gateW+16,14);
      ctx.restore();

      // Rancor crawls out after gate rises
      if(t>0.58){
        const rt=Math.min(1,(t-0.58)/0.22);
        // Start hidden behind gate, crawl forward
        const rx=gateX;
        const ry=gateBaseY-20;
        drawSprite(rx,ry,rt,false,false,sprite,pal,pal);
      }

      // Rumble effect before gate opens
      if(t<0.35&&t>0.1){
        const rumbleA=(t-0.1)/0.25*0.12;
        ctx.fillStyle=`rgba(100,60,20,${rumbleA})`;ctx.fillRect(0,0,CW,CH);
        if(this.tick%8<4){const shk=2;ctx.save();ctx.translate((Math.random()-0.5)*shk,(Math.random()-0.5)*shk);}
      }

      if(t>0.7){const fo=Math.min(0.65,(t-0.7)*3);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.8)csDrawTitle(levelIdx,Math.min(1,(t-0.8)/0.15));
      if(t>0.9)csDrawSkip(Math.min(0.5,(t-0.9)*5));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L5 Trench: X-Wing approaches Death Star, enters trench
function csIntroTrench(levelIdx,onDone){
  const DUR=320;
  CS={tick:0,duration:DUR,onDone,
    draw(){
      const t=this.tick/DUR;
      const cx=CW/2;

      // Phase 0-0.45: space approach — Death Star grows from small dot, X-Wing flies in
      // Phase 0.45-0.75: camera dives into trench
      // Phase 0.75-1.0: title

      if(t<0.45){
        // Space background
        ctx.fillStyle='#000008';ctx.fillRect(0,0,CW,CH);
        STARS.forEach(s=>{ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.s*P,s.s*P);});
        // Death Star — grows from small to large
        const dsT=t/0.45;
        const dsR=8+dsT*180;
        const dsx=cx+80,dsy=CH*0.35;
        // Sphere
        for(let dy=-dsR;dy<=dsR;dy+=P){for(let dx=-dsR;dx<=dsR;dx+=P){
          const d=Math.sqrt(dx*dx+dy*dy);if(d>dsR)continue;
          const shade=d<dsR*0.3?'#5A5A70':d<dsR*0.6?'#3A3A50':'#252535';
          ctx.fillStyle=shade;ctx.fillRect(Math.floor((dsx+dx)/P)*P,Math.floor((dsy+dy)/P)*P,P,P);
        }}
        // Equatorial line
        if(dsR>20){ctx.fillStyle='#1A1A28';ctx.fillRect(dsx-dsR,dsy-P,dsR*2,P*2);}
        // Dish
        if(dsR>30){
          const dishR=dsR*0.25;
          ctx.fillStyle='#4A4A60';
          for(let dy=-dishR;dy<=dishR;dy+=P){for(let dx=-dishR;dx<=dishR;dx+=P){
            const d=Math.sqrt(dx*dx+dy*dy);if(d>dishR)continue;
            ctx.fillRect(Math.floor((dsx-dsR*0.3+dx)/P)*P,Math.floor((dsy-dsR*0.5+dy)/P)*P,P,P);
          }}
        }
        // X-Wing — flies from left toward Death Star
        const xwX=50+dsT*(dsx-dsR-60);
        const xwY=CH*0.5;
        ctx.fillStyle='#888878';
        ctx.fillRect(xwX-20,xwY-4,40,8); // body
        ctx.fillRect(xwX-40,xwY-14,75,5); // top wings
        ctx.fillRect(xwX-40,xwY+9,75,5); // bottom wings
        ctx.fillStyle='#FF4444';
        ctx.fillRect(xwX-44,xwY-16,6,4); // cannon tips
        ctx.fillRect(xwX-44,xwY+12,6,4);
        ctx.fillRect(xwX+36,xwY-16,6,4);
        ctx.fillRect(xwX+36,xwY+12,6,4);
        // Engine glow
        ctx.fillStyle='rgba(100,160,255,0.6)';
        ctx.beginPath();ctx.ellipse(xwX+22,xwY,6,4,0,0,Math.PI*2);ctx.fill();

      } else if(t<0.75){
        // Dive into trench — trench zooms in
        const dt=(t-0.45)/0.3;
        // Draw trench but scaled/zoomed
        const zoom=1+dt*3;
        ctx.save();ctx.translate(cx,CH/2);ctx.scale(zoom,zoom);ctx.translate(-cx,-CH/2);
        drawBgTrench();
        ctx.restore();
        // Speed lines
        ctx.strokeStyle=`rgba(200,220,255,${0.3+dt*0.4})`;ctx.lineWidth=1;
        for(let i=0;i<20;i++){
          const sx=Math.random()*CW,sy=Math.random()*CH;
          const len=10+dt*60;
          ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy+len);ctx.stroke();
        }
        // X-Wing entering trench — shrinks to cockpit view
        if(dt<0.6){
          const xwScale=1-dt*0.8;
          const xwX=cx,xwY=CH*0.7;
          ctx.save();ctx.translate(xwX,xwY);ctx.scale(xwScale,xwScale);
          ctx.fillStyle='#888878';ctx.fillRect(-20,-4,40,8);
          ctx.fillRect(-40,-14,75,5);ctx.fillRect(-40,9,75,5);
          ctx.fillStyle='#FF4444';
          ctx.fillRect(-44,-16,6,4);ctx.fillRect(-44,12,6,4);
          ctx.fillRect(36,-16,6,4);ctx.fillRect(36,12,6,4);
          ctx.restore();
        }
      } else {
        drawBgTrench();
      }

      if(t>0.7){const fo=Math.min(0.65,(t-0.7)*3);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.78)csDrawTitle(levelIdx,Math.min(1,(t-0.78)/0.15));
      if(t>0.88)csDrawSkip(Math.min(0.5,(t-0.88)*5));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L1 & L4: creature falls on its side and explodes
function csOutroFallExplode(levelIdx,onDone){
  const lv=LEVELS[levelIdx];
  const [sprite,pal]=getSprite(lv.enemyType);
  const DUR=260;
  const cx=CW/2,cy=CH*0.52;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      if(lv.bgType==='asteroid')drawBgAsteroid();else if(lv.bgType==='hoth')drawBgHoth(0);else if(lv.bgType==='endor')drawBgEndor(0);else if(lv.bgType==='mandalore')drawBgMandalore(0);else if(lv.bgType==='coruscant')drawBgCoruscant(0);else drawBgDesert(0);

      // Phase 0-0.25: stagger/flash
      // Phase 0.25-0.55: tip and fall to side
      // Phase 0.55-0.75: explode
      // Phase 0.75-1.0: fade black + victory text

      if(t<0.25){
        const shk=(Math.random()-0.5)*6;
        ctx.save();ctx.translate(shk,0);
        drawSprite(cx,cy,1,false,true,sprite,pal,pal);
        ctx.restore();
        const fa=(Math.sin(this.tick*0.8)*0.5+0.5)*0.4;
        ctx.fillStyle=`rgba(255,50,0,${fa})`;ctx.fillRect(0,0,CW,CH);
      } else if(t<0.55){
        const ft=(t-0.25)/0.3;
        // Rotate creature to fall right — rotate up to 90deg
        const rows=sprite.length,cols=sprite[0].length;
        const angle=ft*Math.PI/2;
        ctx.save();
        // pivot at base center
        ctx.translate(cx,cy);ctx.rotate(angle);
        const ox=-(cols*P)/2,oy=-rows*P;
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,oy+r*P,P,P);
        }
        ctx.restore();
        // Ground dust
        if(ft>0.7&&this.tick%3===0)
          csAddParticles(this.particles,cx+60,cy,['#C86820','#A05010'],4,3);
      } else if(t<0.75){
        const et=(t-0.55)/0.2;
        // Big explosion
        if(this.tick%2===0)csAddParticles(this.particles,
          cx+(Math.random()-0.5)*80,cy-(Math.random()*60),
          ['#FF5500','#FF2200','#FFDD00','#FF8800'],10,6);
        // Flash
        const fa=Math.max(0,0.8-et*4);
        ctx.fillStyle=`rgba(255,200,50,${fa})`;ctx.fillRect(0,0,CW,CH);
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.65){const fo=Math.min(1,(t-0.65)/0.2);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.78)csDrawVictoryText(levelIdx,Math.min(1,(t-0.78)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L5 Death Star explodes
function csOutroDeathStar(levelIdx,onDone){
  const DUR=300;
  const cx=CW/2,cy=CH*0.4;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      // Space background
      ctx.fillStyle='#000008';ctx.fillRect(0,0,CW,CH);
      STARS.forEach(s=>{ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.s*P,s.s*P);});

      // Phase 0-0.25: proton torpedo streak into dish
      // Phase 0.25-0.55: growing explosion from core
      // Phase 0.55-0.75: massive shockwave ring
      // Phase 0.75-1.0: debris + victory

      const dsR=90;

      if(t<0.25){
        // Death Star still intact
        for(let dy=-dsR;dy<=dsR;dy+=P){for(let dx=-dsR;dx<=dsR;dx+=P){
          const d=Math.sqrt(dx*dx+dy*dy);if(d>dsR)continue;
          ctx.fillStyle=d<dsR*0.3?'#5A5A70':d<dsR*0.6?'#3A3A50':'#252535';
          ctx.fillRect(Math.floor((cx+dx)/P)*P,Math.floor((cy+dy)/P)*P,P,P);
        }}
        ctx.fillStyle='#1A1A28';ctx.fillRect(cx-dsR,cy-P,dsR*2,P*2);
        // Torpedo streak
        const torpT=t/0.25;
        const tx=cx-dsR*0.3+(0-cx)*(-torpT)+cx*torpT;
        const ty2=cy-dsR*0.5;
        ctx.fillStyle='#FF4444';
        ctx.fillRect(cx-dsR*0.6+torpT*(dsR*0.3),ty2-4,12,4);
        ctx.fillStyle='rgba(255,100,100,0.5)';
        ctx.beginPath();ctx.ellipse(cx-dsR*0.6+torpT*(dsR*0.3),ty2-2,16,6,0,0,Math.PI*2);ctx.fill();
      } else if(t<0.55){
        const et=(t-0.25)/0.3;
        const expR=et*dsR*1.2;
        // Fragmenting Death Star
        const intact=1-et;
        if(intact>0.1){
          ctx.globalAlpha=intact;
          for(let dy=-dsR;dy<=dsR;dy+=P){for(let dx=-dsR;dx<=dsR;dx+=P){
            const d=Math.sqrt(dx*dx+dy*dy);if(d>dsR)continue;
            ctx.fillStyle=d<dsR*0.3?'#5A5A70':d<dsR*0.6?'#3A3A50':'#252535';
            ctx.fillRect(Math.floor((cx+dx)/P)*P,Math.floor((cy+dy)/P)*P,P,P);
          }}
          ctx.globalAlpha=1;
        }
        // Explosion core
        ctx.fillStyle=`rgba(255,200,50,${0.9-et*0.5})`;
        ctx.beginPath();ctx.arc(cx,cy,expR,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,80,0,${0.7-et*0.4})`;
        ctx.beginPath();ctx.arc(cx,cy,expR*0.7,0,Math.PI*2);ctx.fill();
        // Flying debris
        if(this.tick%2===0)csAddParticles(this.particles,
          cx+(Math.random()-0.5)*expR*2,cy+(Math.random()-0.5)*expR*2,
          ['#4A4A60','#252535','#5A5A70','#FF5500','#FFAA00'],8,5);
      } else if(t<0.75){
        const st=(t-0.55)/0.2;
        // Shockwave ring expanding outward
        const ringR=st*300;
        ctx.strokeStyle=`rgba(255,220,100,${Math.max(0,0.8-st*1.5)})`;
        ctx.lineWidth=8-st*6;
        ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);ctx.stroke();
        // Second ring
        if(st>0.3){
          ctx.strokeStyle=`rgba(255,120,40,${Math.max(0,0.6-(st-0.3)*2)})`;
          ctx.lineWidth=4;
          ctx.beginPath();ctx.arc(cx,cy,ringR*0.7,0,Math.PI*2);ctx.stroke();
        }
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.7){const fo=Math.min(0.9,(t-0.7)/0.2);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.8)csDrawVictoryText(levelIdx,Math.min(1,(t-0.8)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L6 Sarlacc: ground rumbles, sand explodes, sarlacc rises from the pit
function csIntroSarlacc(levelIdx,onDone){
  const [sprite,pal]=getSprite('sarlacc');
  const DUR=300;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgDesert(0);

      const cx=CW/2, groundY=CH*0.54;

      // Phase 0-0.25: rumble — ground shakes, cracks appear
      // Phase 0.35-0.65: sand explodes outward, pit opens
      // Phase 0.55-0.85: sarlacc rises from pit
      // Phase 0.78-1.0: title

      // Ground crack lines radiating from center pit
      if(t>0.1){
        const crackA=Math.min(1,(t-0.1)/0.2);
        ctx.strokeStyle=`rgba(60,30,10,${crackA*0.8})`;ctx.lineWidth=2;
        [[0,-1],[0.5,-0.8],[1,-0.3],[1,0.5],[-1,-0.3],[-0.5,-0.8]].forEach(([dx,dy])=>{
          ctx.beginPath();
          ctx.moveTo(cx,groundY);
          ctx.lineTo(cx+dx*70,groundY+dy*40);
          ctx.stroke();
        });
      }

      // Sand explosion particles
      if(t>0.25&&t<0.6&&this.tick%3===0){
        csAddParticles(this.particles,cx,groundY,
          ['#C86820','#E09040','#AA5010','#D4A050'],10,6);
      }

      // Pit opening — dark oval grows
      if(t>0.3){
        const pt=Math.min(1,(t-0.3)/0.3);
        const pw=pt*140, ph=pt*50;
        ctx.fillStyle='#0A0502';
        ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.fill();
        // Pit rim — sandy edge
        ctx.strokeStyle=`rgba(160,100,40,${pt*0.8})`;ctx.lineWidth=4;
        ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.stroke();
      }

      // Sarlacc rises from pit — clip to above ground
      if(t>0.5){
        const rt=Math.min(1,(t-0.5)/0.35);
        // Rise from below ground to fully visible
        const spriteH=sprite.length*P;
        const spyTarget=groundY;
        const spyStart=groundY+spriteH*0.6; // starts mostly underground
        const spy=spyStart+(spyTarget-spyStart)*rt;
        ctx.save();
        // Clip to hide below the ground line
        ctx.beginPath();ctx.rect(0,0,CW,groundY+20);ctx.clip();
        drawSprite(cx,spy,1,false,false,sprite,pal,pal);
        ctx.restore();
        // Sand spray on rise
        if(rt<0.5&&this.tick%4===0)
          csAddParticles(this.particles,cx,groundY,['#D4A050','#C87830'],6,4);
      }

      // Screen shake during rumble
      if(t>0.1&&t<0.55){
        const shk=Math.sin(this.tick*0.8)*((t<0.35)?2:4);
        ctx.save();ctx.translate(shk,0);ctx.restore();
      }

      this.particles=csDrawParticles(this.particles);

      if(t>0.72){const fo=Math.min(0.7,(t-0.72)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.80)csDrawTitle(levelIdx,Math.min(1,(t-0.80)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L7 Endor: AT-ST marches out from between the trees into a clearing
function csIntroATST(levelIdx,onDone){
  const [sprite,pal]=getSprite('atst');
  const DUR=290;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgEndor(0);

      // Phase 0-0.5: AT-ST walks in from right side between trees, gets larger
      // Phase 0.5-0.72: stops center, stomps ground
      // Phase 0.72-1.0: title

      const groundY=CH*0.54;
      const startX=CW+60;  // starts off-screen right
      const endX=CW/2;

      if(t<0.5){
        const wt=t/0.5;
        // Walk in from right, easing
        const ease=1-Math.pow(1-wt,2);
        const ex=startX+(endX-startX)*ease;
        const ey=groundY;

        // Leg bob — AT-ST walking animation
        const bob=Math.sin(this.tick*0.35)*4;
        const lean=Math.sin(this.tick*0.18)*0.06; // slight body lean

        ctx.save();ctx.translate(ex,ey+bob);ctx.rotate(lean);
        const rows=sprite.length,cols=sprite[0].length;
        const ox=-(cols*P)/2;
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,-rows*P+r*P,P,P);
        }
        ctx.restore();

        // Dust kicked up by feet
        if(this.tick%5===0&&wt>0.2)
          csAddParticles(this.particles,ex+20,ey,['#183818','#102010','#204820'],4,2);

      } else {
        // Standing — slight idle sway
        const sway=Math.sin(this.tick*0.12)*2;
        drawSprite(endX,groundY+sway,1,false,false,sprite,pal,pal);

        // Stomp impact at t~0.52 — ground shudder + debris
        if(t>0.50&&t<0.56&&this.tick%3===0)
          csAddParticles(this.particles,endX,groundY,['#183818','#224422','#102810'],8,4);

        // Searchlight sweep from cockpit
        if(t>0.55){
          const beamT=(t-0.55)/0.17;
          const beamAngle=-0.4+beamT*0.8; // sweeps left to right
          const bx=endX+Math.sin(beamAngle)*120;
          const by=groundY-sprite.length*P*0.6+Math.cos(beamAngle)*80;
          const grad=ctx.createRadialGradient(endX,groundY-sprite.length*P*0.55,0,bx,by,60);
          grad.addColorStop(0,'rgba(220,240,200,0.25)');
          grad.addColorStop(1,'rgba(220,240,200,0)');
          ctx.fillStyle=grad;
          ctx.beginPath();ctx.arc(bx,by,60,0,Math.PI*2);ctx.fill();
        }
      }

      this.particles=csDrawParticles(this.particles);

      if(t>0.68){const fo=Math.min(0.7,(t-0.68)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.76)csDrawTitle(levelIdx,Math.min(1,(t-0.76)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L8 Hoth: AT-AT walks slowly across the horizon through blizzard
function csIntroATAT(levelIdx,onDone){
  const [sprite,pal]=getSprite('atat');
  const DUR=320;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgHoth(0);
      updateDrawSnow();

      // AT-AT walks across the horizon from left to right
      // It stays small — distant — silhouetted against the icy hills
      // Phase 0-0.65: walks across horizon, slow and ominous
      // Phase 0.65-1.0: title fades in

      const horizonY = CH*0.52; // just above the ice ground line
      const startX = -80;
      const endX = CW + 80;
      const walkX = startX + (endX - startX) * (t / 0.7);

      // Distant scale — AT-AT is far away on the horizon
      const scale = 0.55;

      // Slow leg sway for walking
      const legBob = Math.sin(this.tick * 0.18) * 3 * scale;
      const bodyLean = Math.sin(this.tick * 0.09) * 0.03;

      // Draw distant AT-AT — grey-blue silhouette against icy sky
      ctx.save();
      ctx.translate(walkX, horizonY + legBob);
      ctx.scale(scale, scale);
      ctx.rotate(bodyLean);
      const rows = sprite.length, cols = sprite[0].length;
      const ox = -(cols * P) / 2;
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        const v = sprite[r][c]; if(!v) continue;
        // Tint towards icy blue-grey for distant look
        const baseCol = pal[v];
        ctx.fillStyle = baseCol;
        ctx.fillRect(ox + c*P, -rows*P + r*P, P, P);
      }
      ctx.restore();

      // Footstep impacts — snow puffs when feet hit ground
      const footPhase = (this.tick * 0.18) % (Math.PI * 2);
      if(footPhase > Math.PI - 0.15 && footPhase < Math.PI + 0.15){
        if(this.tick % 4 === 0)
          csAddParticles(this.particles, walkX + 30*scale, horizonY,
            ['#D0E4F4','#B8CCE0','#E8F4FF'], 6, 2);
      }
      if(footPhase > 2*Math.PI - 0.15){
        if(this.tick % 4 === 0)
          csAddParticles(this.particles, walkX - 30*scale, horizonY,
            ['#D0E4F4','#B8CCE0','#E8F4FF'], 6, 2);
      }

      // Second AT-AT further back — even smaller, offset
      if(t > 0.05){
        const scale2 = 0.32;
        const walkX2 = startX * 0.6 + (endX - startX * 0.6) * ((t - 0.05) / 0.72);
        const legBob2 = Math.sin(this.tick * 0.15 + 1.2) * 2 * scale2;
        ctx.save();
        ctx.translate(walkX2 - 60, horizonY - 12 + legBob2);
        ctx.scale(scale2, scale2);
        ctx.globalAlpha = 0.65; // slightly faded — more distant
        for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
          const v = sprite[r][c]; if(!v) continue;
          ctx.fillStyle = pal[v];
          ctx.fillRect(ox + c*P, -rows*P + r*P, P, P);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      this.particles = csDrawParticles(this.particles);

      // Blizzard wind overlay
      if(this.tick % 3 === 0){
        ctx.fillStyle = 'rgba(200,220,240,0.04)';
        ctx.fillRect(0, 0, CW, CH);
      }

      if(t > 0.62){const fo=Math.min(0.7,(t-0.62)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t > 0.72) csDrawTitle(levelIdx, Math.min(1,(t-0.72)/0.15));
      this.tick++; if(this.tick >= DUR) this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L9 Mandalore: mythosaur rises from cracked wasteland ground
function csIntroMythosaur(levelIdx,onDone){
  const [sprite,pal]=getSprite('mythosaur');
  const DUR=310;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgMandalore(0);

      const cx=CW/2, groundY=CH*0.54;

      // Phase 0-0.2: deep rumble, ground glows red beneath
      // Phase 0.2-0.45: ground cracks open, lava-glow widens
      // Phase 0.45-0.78: mythosaur rises from below
      // Phase 0.78-1.0: title

      // Subsurface glow before eruption
      if(t>0.05){
        const gA=Math.min(0.6,(t-0.05)/0.3);
        for(let r=80;r>0;r-=15){
          ctx.fillStyle=`rgba(220,80,10,${gA*(80-r)/80*0.3})`;
          ctx.beginPath();ctx.ellipse(cx,groundY,r,r*0.25,0,0,Math.PI*2);ctx.fill();
        }
      }

      // Crack lines radiating outward
      if(t>0.15){
        const cA=Math.min(1,(t-0.15)/0.2);
        ctx.strokeStyle=`rgba(220,120,30,${cA*0.9})`;ctx.lineWidth=2;
        [[-1,-0.3],[-0.6,-0.8],[0,-1],[0.6,-0.8],[1,-0.2],[-1,0.3],[1,0.4]].forEach(([dx,dy])=>{
          const len=50+cA*40;
          ctx.beginPath();ctx.moveTo(cx,groundY);
          ctx.lineTo(cx+dx*len,groundY+dy*len*0.4);ctx.stroke();
        });
      }

      // Pit opening
      if(t>0.25){
        const pt=Math.min(1,(t-0.25)/0.22);
        const pw=pt*120, ph=pt*40;
        // Lava glow inside pit
        const grad=ctx.createRadialGradient(cx,groundY,0,cx,groundY,pw);
        grad.addColorStop(0,'rgba(255,140,20,0.9)');
        grad.addColorStop(0.5,'rgba(180,60,10,0.7)');
        grad.addColorStop(1,'rgba(80,20,5,0)');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.fill();
        // Dark pit rim
        ctx.fillStyle='#0A0402';
        ctx.beginPath();ctx.ellipse(cx,groundY,pw*0.7,ph*0.6,0,0,Math.PI*2);ctx.fill();
        // Debris erupting
        if(t<0.55&&this.tick%3===0)
          csAddParticles(this.particles,cx,groundY,['#CC5010','#E07020','#AA3008','#FF9030'],10,6);
      }

      // Mythosaur rises — emerges from pit
      if(t>0.42){
        const rt=Math.min(1,(t-0.42)/0.38);
        const spriteH=sprite.length*P;
        const spyStart=groundY+spriteH*0.7;
        const spyEnd=groundY;
        const spy=spyStart+(spyEnd-spyStart)*rt;
        ctx.save();
        ctx.beginPath();ctx.rect(0,0,CW,groundY+18);ctx.clip();
        drawSprite(cx,spy,1,false,false,sprite,pal,pal);
        ctx.restore();
        // Rock/ash spray on rise
        if(rt<0.5&&this.tick%4===0)
          csAddParticles(this.particles,cx,groundY,['#3A1A08','#CC6010','#502010'],8,5);
      }

      this.particles=csDrawParticles(this.particles);

      // Screen shake during eruption
      if(t>0.2&&t<0.55){
        const shk=Math.sin(this.tick*1.1)*(t<0.4?3:5);
        if(this.tick%2===0){ctx.save();ctx.translate(shk,0);ctx.restore();}
      }

      if(t>0.72){const fo=Math.min(0.7,(t-0.72)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.80)csDrawTitle(levelIdx,Math.min(1,(t-0.80)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L10 Coruscant: Zillo Beast bursts through a dome-shaped building
function csIntroZillo(levelIdx,onDone){
  const [sprite,pal]=getSprite('zillo');
  const DUR=320;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgCoruscant(0);

      const cx=CW/2, groundY=CH*0.56;
      const domeX=cx, domeRX=130, domeRY=90;

      // Phase 0-0.3: dome intact, lights flicker inside
      // Phase 0.3-0.52: dome cracks, glows from within
      // Phase 0.52-0.78: zillo bursts through top, debris flies
      // Phase 0.78-1.0: title

      const crackT=Math.max(0,(t-0.28)/0.25);
      const burstT=Math.max(0,(t-0.50)/0.30);

      // Draw dome — futuristic half-sphere building
      if(burstT<1){
        // Dome base platform
        ctx.fillStyle='#0C0C24';
        ctx.fillRect(domeX-domeRX-20,groundY,domeRX*2+40,18);
        // Accent lights on platform
        ctx.fillStyle='rgba(100,180,255,0.6)';
        [-100,-60,-20,20,60,100].forEach(dx=>{ctx.fillRect(domeX+dx-2,groundY+4,4,4);});

        // Dome shell — draw as arc segments for pixel style
        const segments=16;
        for(let i=0;i<segments;i++){
          const a1=Math.PI+i*(Math.PI/segments);
          const a2=Math.PI+(i+1)*(Math.PI/segments);
          const crackOffset=(crackT>0&&i>4&&i<12)?Math.sin(crackT*8+i)*crackT*8:0;
          ctx.fillStyle=i%3===0?'#141430':'#10102A';
          ctx.beginPath();
          ctx.moveTo(domeX,groundY);
          for(let a=a1;a<=a2;a+=0.05){
            ctx.lineTo(domeX+Math.cos(a)*(domeRX+crackOffset),groundY+Math.sin(a)*domeRY);
          }
          ctx.closePath();ctx.fill();
        }

        // Dome rim edge
        ctx.strokeStyle='rgba(100,150,255,0.5)';ctx.lineWidth=3;
        ctx.beginPath();ctx.ellipse(domeX,groundY,domeRX,domeRY,0,Math.PI,0);ctx.stroke();

        // Interior glow — intensifies before burst
        if(t>0.2){
          const glowA=Math.min(0.5,(t-0.2)/0.3);
          const glowCol=`rgba(${Math.round(100+glowA*155)},${Math.round(80+glowA*60)},255,${glowA})`;
          ctx.fillStyle=glowCol;
          ctx.beginPath();ctx.ellipse(domeX,groundY+10,domeRX*0.7,domeRY*0.6,0,Math.PI,0);ctx.fill();
        }

        // Crack lines on dome surface
        if(crackT>0){
          ctx.strokeStyle=`rgba(180,220,255,${crackT*0.8})`;ctx.lineWidth=1;
          [[0,-domeRY*0.9],[domeRX*0.5,-domeRY*0.5],[-domeRX*0.5,-domeRY*0.5],
           [domeRX*0.8,-domeRY*0.2],[-domeRX*0.7,-domeRY*0.3]].forEach(([dx,dy])=>{
            ctx.beginPath();ctx.moveTo(domeX,groundY);
            ctx.lineTo(domeX+dx+Math.sin(crackT*5)*4,groundY+dy);ctx.stroke();
          });
        }
      }

      // Debris chunks flying out on burst
      if(burstT>0&&burstT<0.5&&this.tick%2===0){
        csAddParticles(this.particles,domeX,groundY-domeRY*0.6,
          ['#10102A','#141430','#88AAFF','#202050'],14,8);
      }

      // Zillo beast bursts through top of dome
      if(burstT>0){
        const spriteH=sprite.length*P;
        // Starts from dome center rising upward
        const spyStart=groundY;
        const spyEnd=groundY-domeRY-spriteH*0.3;
        const spy=spyStart+(spyEnd-spyStart)*Math.min(1,burstT*1.4);

        ctx.save();
        // Only clip during early burst — once fully out, show full sprite
        if(burstT<0.4){
          ctx.beginPath();ctx.rect(0,0,CW,groundY+5);ctx.clip();
        }
        drawSprite(domeX,spy,1,false,false,sprite,pal,pal);
        ctx.restore();
      }

      this.particles=csDrawParticles(this.particles);

      // Explosion flash at burst moment
      if(burstT>0&&burstT<0.08){
        ctx.fillStyle=`rgba(180,200,255,${(0.08-burstT)*6})`;
        ctx.fillRect(0,0,CW,CH);
      }

      if(t>0.72){const fo=Math.min(0.7,(t-0.72)*3.5);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.80)csDrawTitle(levelIdx,Math.min(1,(t-0.80)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

function startIntroCutscene(levelIdx,onDone){
  if(levelIdx===0||levelIdx===3) csIntroArc(levelIdx,onDone);
  else if(levelIdx===1) csIntroWampa(levelIdx,onDone);
  else if(levelIdx===2) csIntroRancor(levelIdx,onDone);
  else if(levelIdx===4) csIntroTrench(levelIdx,onDone);
  else if(levelIdx===5) csIntroSarlacc(levelIdx,onDone);
  else if(levelIdx===6) csIntroATST(levelIdx,onDone);
  else if(levelIdx===7) csIntroATAT(levelIdx,onDone);
  else if(levelIdx===8) csIntroMythosaur(levelIdx,onDone);
  else if(levelIdx===9) csIntroZillo(levelIdx,onDone);
  else csIntroArc(levelIdx,onDone);
}
// L6 Sarlacc: sinks back into the ground, sand closes over it
function csOutroSarlacc(levelIdx,onDone){
  const [sprite,pal]=getSprite('sarlacc');
  const DUR=270;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgDesert(0);
      const cx=CW/2,groundY=CH*0.54;

      // Phase 0-0.15: flash hit, sarlacc shudders
      // Phase 0.15-0.55: sarlacc sinks slowly into ground, pit closes
      // Phase 0.55-0.75: ground seals, sand sprays settle
      // Phase 0.75-1.0: fade + victory

      const sinkT=Math.max(0,(t-0.12)/0.45);
      const spriteH=sprite.length*P;

      // Pit opening shrinks as sarlacc sinks
      if(t>0.05){
        const pitOpen=Math.max(0,1-sinkT*1.1);
        const pw=pitOpen*120, ph=pitOpen*40;
        if(pw>2){
          ctx.fillStyle='#0A0502';
          ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.fill();
          ctx.strokeStyle=`rgba(160,100,40,${pitOpen*0.7})`;ctx.lineWidth=3;
          ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.stroke();
        }
      }

      // Sarlacc sinks — clip to above ground, move downward
      if(t<0.6){
        const spyTop = groundY - spriteH*(1-sinkT*1.2);
        const emerge = Math.max(0,1-sinkT*1.3);
        ctx.save();
        ctx.beginPath();ctx.rect(0,0,CW,groundY+10);ctx.clip();
        if(t<0.15){
          // Flash/shudder
          const shk=(Math.random()-0.5)*6;
          ctx.translate(shk,0);
          drawSprite(cx,groundY,1,false,true,sprite,pal,pal);
        } else {
          drawSprite(cx,groundY+(sinkT*spriteH*0.9),emerge,false,false,sprite,pal,pal);
        }
        ctx.restore();
      }

      // Sand closing in — particles converging
      if(t>0.3&&t<0.65&&this.tick%3===0)
        csAddParticles(this.particles,
          cx+(Math.random()-0.5)*100,groundY,
          ['#C86820','#AA5010','#E09040'],6,3);

      // Hit flash
      if(t<0.15){
        const fa=(Math.sin(this.tick*1.2)*0.5+0.5)*0.45;
        ctx.fillStyle=`rgba(255,100,0,${fa})`;ctx.fillRect(0,0,CW,CH);
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.65){const fo=Math.min(1,(t-0.65)/0.2);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.78)csDrawVictoryText(levelIdx,Math.min(1,(t-0.78)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L7 Endor: two logs swing in from both sides and crush the AT-ST
function csOutroATST(levelIdx,onDone){
  const [sprite,pal]=getSprite('atst');
  const DUR=280;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgEndor(0);
      const cx=CW/2,cy=CH*0.52;

      // Phase 0-0.2: AT-ST stands, logs visible swinging in from sides
      // Phase 0.2-0.42: logs swing fast inward — impact
      // Phase 0.42-0.62: AT-ST crushed/crumpled, debris, logs stopped
      // Phase 0.62-0.78: explosion/sparks
      // Phase 0.78-1.0: fade + victory

      const swingT=Math.min(1,Math.max(0,(t-0.1)/0.32));
      const logImpact=swingT>=1;
      const impactT=Math.max(0,(t-0.42)/0.2);

      // Draw logs — thick brown cylinders swinging on ropes from top
      const logLen=180, logThick=16;
      // Left log: swings from left edge inward
      const leftAngle=-Math.PI*0.55 + swingT*Math.PI*0.42; // starts far left, swings right
      const rightAngle=-Math.PI*0.45 + swingT*(-Math.PI*0.42+Math.PI); // mirror

      [[leftAngle,cx-220,'#6A3A10','#4A2808',1],
       [rightAngle,cx+220,'#6A3A10','#4A2808',-1]].forEach(([ang,pivotX,c1,c2,dir])=>{
        const lx=pivotX+Math.sin(ang)*logLen*dir;
        const ly=Math.max(0,Math.cos(ang)*logLen);
        // Rope
        ctx.strokeStyle='#8A6A40';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(pivotX,0);ctx.lineTo(lx,ly);ctx.stroke();
        // Log body
        const nx=Math.cos(ang)*dir,ny=-Math.sin(ang);
        ctx.save();ctx.translate(lx,ly);ctx.rotate(ang-(dir>0?Math.PI/2:-Math.PI/2));
        ctx.fillStyle=c1;ctx.fillRect(-logThick/2,-logLen*0.5,logThick,logLen);
        ctx.fillStyle=c2;ctx.fillRect(-logThick/2+2,-logLen*0.5+2,logThick-4,logLen-4);
        // Log rings
        ctx.strokeStyle='#3A1808';ctx.lineWidth=2;
        [-logLen*0.25,0,logLen*0.25].forEach(ry=>{
          ctx.beginPath();ctx.moveTo(-logThick/2,ry);ctx.lineTo(logThick/2,ry);ctx.stroke();
        });
        ctx.restore();
      });

      // AT-ST — crushed between logs after impact
      if(impactT<0.05){
        drawSprite(cx,cy,1,false,t<0.2,sprite,pal,pal);
      } else if(impactT<0.35){
        // Crumple — squish horizontally
        const squish=1-impactT*0.7;
        const stretch=1+impactT*0.5;
        ctx.save();ctx.translate(cx,cy);ctx.scale(squish,stretch);
        const rows=sprite.length,cols=sprite[0].length;
        const ox=-(cols*P)/2;
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,-rows*P+r*P,P,P);
        }
        ctx.restore();
        // Impact debris and sparks
        if(this.tick%2===0)
          csAddParticles(this.particles,cx+(Math.random()-0.5)*60,cy-20,
            ['#4A2808','#888860','#AAAAAA','#FFAA00'],8,6);
      }

      // Explosion after crush
      if(t>0.6&&t<0.78&&this.tick%2===0)
        csAddParticles(this.particles,cx+(Math.random()-0.5)*50,cy-30,
          ['#FF5500','#FF2200','#FFDD00','#FF8800'],8,5);
      if(t>0.6&&t<0.65){
        ctx.fillStyle=`rgba(255,200,50,${(0.65-t)*10})`;ctx.fillRect(0,0,CW,CH);
      }

      // Hit flash on impact
      if(t>0.40&&t<0.46){
        ctx.fillStyle=`rgba(255,220,100,${(0.46-t)*12})`;ctx.fillRect(0,0,CW,CH);
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.68){const fo=Math.min(1,(t-0.68)/0.18);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.80)csDrawVictoryText(levelIdx,Math.min(1,(t-0.80)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L8 AT-AT: staggers, buckles to front knees, falls sideways, massive explosion
function csOutroATAT(levelIdx,onDone){
  const [sprite,pal]=getSprite('atat');
  const DUR=330;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgHoth(0);
      updateDrawSnow();
      const cx=CW/2,cy=CH*0.50;
      const rows=sprite.length,cols=sprite[0].length;
      const ox=-(cols*P)/2,oy=-rows*P;

      // Phase 0-0.18: flash hit, staggers
      // Phase 0.18-0.38: front legs buckle — body pitches forward/down
      // Phase 0.38-0.60: falls sideways from buckled position
      // Phase 0.60-0.78: massive staggered explosions
      // Phase 0.78-1.0: fade + victory

      if(t<0.18){
        // Stagger
        const shk=(Math.random()-0.5)*10;
        ctx.save();ctx.translate(shk,shk*0.3);
        drawSprite(cx,cy,1,false,true,sprite,pal,pal);
        ctx.restore();
        const fa=(Math.sin(this.tick*0.8)*0.5+0.5)*0.5;
        ctx.fillStyle=`rgba(255,80,0,${fa})`;ctx.fillRect(0,0,CW,CH);

      } else if(t<0.38){
        // Knee buckle — front pitches down, scaleY compresses at bottom (legs folding)
        const kt=(t-0.18)/0.20;
        // Translate down slightly as knees hit, lean forward
        const leanAngle=kt*0.22;          // slight forward lean
        const dropY=kt*18;                // body drops as legs fold
        // Squash the bottom of the sprite to simulate legs compressing
        ctx.save();
        ctx.translate(cx, cy+dropY);
        ctx.rotate(leanAngle);
        // Draw with slight vertical squash at base
        for(let r=0;r<rows;r++){
          const rowFrac=r/rows;
          // Bottom rows compress inward
          const squash=rowFrac>0.55?1-kt*(rowFrac-0.55)*1.6:1;
          for(let c=0;c<cols;c++){
            const v=sprite[r][c];if(!v)continue;
            ctx.fillStyle=pal[v];
            ctx.fillRect(ox+c*P, oy+r*P*squash, P, P*squash);
          }
        }
        ctx.restore();
        // Snow/ice dust from impact
        if(kt>0.5&&this.tick%2===0)
          csAddParticles(this.particles,cx+(Math.random()-0.5)*80,cy+dropY,
            ['#D0E4F4','#FFFFFF','#B0C8E0'],6,4);

      } else if(t<0.60){
        // Fall from buckled position — rotate from slightly forward lean
        const ft=(t-0.38)/0.22;
        const startAngle=0.22;
        const angle=startAngle+ft*(Math.PI*0.50-startAngle);
        const dropY=18; // keep the drop offset from knee phase
        ctx.save();ctx.translate(cx,cy+dropY);ctx.rotate(angle);
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
          const v=sprite[r][c];if(!v)continue;
          ctx.fillStyle=pal[v];ctx.fillRect(ox+c*P,oy+r*P,P,P);
        }
        ctx.restore();
        if(ft>0.4&&this.tick%2===0)
          csAddParticles(this.particles,cx+ft*110,cy+dropY,
            ['#D0E4F4','#FFFFFF','#B0C8E0'],8,4);

      } else if(t<0.78){
        // Staggered explosions
        if(this.tick%2===0){
          csAddParticles(this.particles,
            cx+(Math.random()-0.5)*120,cy-(Math.random()*80),
            ['#FF5500','#FF2200','#FFDD00','#FF8800','#FFFFFF'],14,8);
        }
        const pulses=[0.61,0.65,0.69,0.73];
        pulses.forEach(pt=>{
          if(Math.abs(t-pt)<0.015){
            ctx.fillStyle=`rgba(255,220,100,${(0.015-Math.abs(t-pt))*40})`;
            ctx.fillRect(0,0,CW,CH);
          }
        });
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.72){const fo=Math.min(1,(t-0.72)/0.2);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.82)csDrawVictoryText(levelIdx,Math.min(1,(t-0.82)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L9 Mythosaur: sinks back into the Mandalore ground, earth closes over it
function csOutroMythosaur(levelIdx,onDone){
  const [sprite,pal]=getSprite('mythosaur');
  const DUR=270;
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgMandalore(0);
      const cx=CW/2,groundY=CH*0.54;

      // Phase 0-0.15: flash hit, mythosaur shudders
      // Phase 0.15-0.58: sinks slowly into cracked ground, pit of lava-glow closes
      // Phase 0.58-0.75: ground seals, embers settle
      // Phase 0.75-1.0: fade + victory

      const sinkT=Math.max(0,(t-0.12)/0.48);
      const spriteH=sprite.length*P;

      // Pit opening — lava glow inside, shrinks as mythosaur sinks
      if(t>0.05){
        const pitOpen=Math.max(0,1-sinkT*1.1);
        const pw=pitOpen*130, ph=pitOpen*44;
        if(pw>2){
          // Lava glow
          const grad=ctx.createRadialGradient(cx,groundY,0,cx,groundY,pw);
          grad.addColorStop(0,'rgba(220,100,20,0.9)');
          grad.addColorStop(0.5,'rgba(160,50,10,0.6)');
          grad.addColorStop(1,'rgba(60,15,5,0)');
          ctx.fillStyle=grad;
          ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.fill();
          // Dark pit rim
          ctx.strokeStyle=`rgba(120,60,20,${pitOpen*0.8})`;ctx.lineWidth=3;
          ctx.beginPath();ctx.ellipse(cx,groundY,pw,ph,0,0,Math.PI*2);ctx.stroke();
        }
      }

      // Mythosaur sinks — clip to above ground
      if(t<0.62){
        const emerge=Math.max(0,1-sinkT*1.3);
        ctx.save();
        ctx.beginPath();ctx.rect(0,0,CW,groundY+10);ctx.clip();
        if(t<0.15){
          const shk=(Math.random()-0.5)*6;
          ctx.translate(shk,0);
          drawSprite(cx,groundY,1,false,true,sprite,pal,pal);
        } else {
          drawSprite(cx,groundY+(sinkT*spriteH*0.9),emerge,false,false,sprite,pal,pal);
        }
        ctx.restore();
      }

      // Ember/ash particles as it sinks
      if(t>0.25&&t<0.65&&this.tick%3===0)
        csAddParticles(this.particles,
          cx+(Math.random()-0.5)*110,groundY,
          ['#CC5010','#E07020','#501808','#FF9030'],6,4);

      // Hit flash
      if(t<0.15){
        const fa=(Math.sin(this.tick*1.2)*0.5+0.5)*0.45;
        ctx.fillStyle=`rgba(255,100,0,${fa})`;ctx.fillRect(0,0,CW,CH);
      }

      this.particles=csDrawParticles(this.particles);
      if(t>0.65){const fo=Math.min(1,(t-0.65)/0.2);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.78)csDrawVictoryText(levelIdx,Math.min(1,(t-0.78)/0.15));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

// L10 Zillo Beast: rays of light burst out and spin 3 times, then beast implodes
function csOutroZillo(levelIdx,onDone){
  const [sprite,pal]=getSprite('zillo');
  const DUR=360; // 6 seconds — give the spin room to breathe
  CS={tick:0,duration:DUR,onDone,skippable:false,particles:[],
    draw(){
      const t=this.tick/DUR;
      drawBgCoruscant(0);
      const cx=CW/2,cy=CH*0.46;

      // Phase 0-0.12: hit flash, beast shudders
      // Phase 0.12-0.68: rays burst out, spin 3 full rotations around beast
      // Phase 0.68-0.82: rays converge back in, beast scales down to nothing (implosion)
      // Phase 0.82-0.88: shockwave ring expands
      // Phase 0.88-1.0: fade + victory

      const rayPhase  = Math.max(0, Math.min(1, (t - 0.12) / 0.56)); // 0→1 over spin window
      const implodeT  = Math.max(0, (t - 0.68) / 0.14);              // 0→1 implosion
      const shockT    = Math.max(0, (t - 0.82) / 0.06);              // 0→1 shockwave

      // --- RAYS ---
      if(t > 0.12 && t < 0.84){
        const numRays = 8;
        // 3 full rotations over rayPhase 0→1
        const baseAngle = rayPhase * Math.PI * 6;
        // Ray length grows in then stays extended, then shrinks on implosion
        const rayLen = implodeT > 0
          ? Math.max(0, 140 * (1 - implodeT * 1.2))
          : Math.min(140, rayPhase * 280);

        const rayColors = ['#88DDFF','#FFFFFF','#AAEEFF','#66CCFF','#DDEEFF'];

        for(let i = 0; i < numRays; i++){
          const angle = baseAngle + (i / numRays) * Math.PI * 2;
          const cos = Math.cos(angle), sin = Math.sin(angle);

          // Draw ray as a tapered beam
          const rw = 4; // half-width at base
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);

          // Outer glow
          ctx.globalAlpha = 0.25;
          ctx.fillStyle = '#AADDFF';
          ctx.fillRect(-rw*1.8, 0, rw*3.6, rayLen);

          // Core beam
          ctx.globalAlpha = 0.85;
          const grad = ctx.createLinearGradient(0, 0, 0, rayLen);
          grad.addColorStop(0, '#FFFFFF');
          grad.addColorStop(0.3, rayColors[i % rayColors.length]);
          grad.addColorStop(1, 'rgba(100,200,255,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(-rw, 0, rw*2, rayLen);

          ctx.globalAlpha = 1;
          ctx.restore();
        }

        // Bright core glow at beast center
        const coreR = implodeT > 0 ? 30*(1-implodeT) : Math.min(30, rayPhase*60);
        if(coreR > 0){
          const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
          cg.addColorStop(0,'rgba(255,255,255,0.95)');
          cg.addColorStop(0.4,'rgba(150,220,255,0.6)');
          cg.addColorStop(1,'rgba(80,160,255,0)');
          ctx.fillStyle=cg;
          ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fill();
        }
      }

      // --- BEAST SPRITE ---
      if(implodeT < 1){
        // During hit phase: shudder
        if(t < 0.12){
          const shk=Math.sin(this.tick*1.4)*8;
          ctx.save();ctx.translate(shk,0);
          drawSprite(cx,cy,1,false,true,sprite,pal,pal);
          ctx.restore();
          const fa=(Math.sin(this.tick*1.0)*0.5+0.5)*0.5;
          ctx.fillStyle=`rgba(100,200,255,${fa})`;ctx.fillRect(0,0,CW,CH);
        } else {
          // During rays: beast glows and pulses slightly
          const scale = implodeT > 0
            ? Math.max(0, 1 - implodeT*implodeT*1.1)  // fast implosion curve
            : 1 + Math.sin(this.tick * 0.3)*0.04;      // gentle pulse during spin

          if(scale > 0){
            // Draw with energy tint that intensifies toward implosion
            const tintA = implodeT > 0 ? implodeT*0.8 : rayPhase*0.3;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);
            drawSprite(cx, cy, 1, false, false, sprite, pal, pal);
            if(tintA>0){
              ctx.fillStyle=`rgba(150,220,255,${tintA})`;
              ctx.fillRect(0,0,CW,CH);
            }
            ctx.restore();
          }
        }
      }

      // --- SHOCKWAVE after implosion ---
      if(shockT > 0 && shockT < 1){
        for(let ring=0; ring<3; ring++){
          const r = shockT * 200 + ring*25;
          const a = Math.max(0, 0.7 - shockT*0.7 - ring*0.18);
          ctx.strokeStyle=`rgba(150,220,255,${a})`;
          ctx.lineWidth=P*(3-ring);
          ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
        }
        // Particle burst on first frame
        if(shockT < 0.04 && this.tick%1===0)
          csAddParticles(this.particles,cx,cy,
            ['#FFFFFF','#88DDFF','#AAEEFF','#4488CC'],24,12);
      }

      // Ongoing particle trail from implosion
      if(implodeT>0.1 && implodeT<0.9 && this.tick%2===0)
        csAddParticles(this.particles,
          cx+(Math.random()-0.5)*20, cy+(Math.random()-0.5)*20,
          ['#FFFFFF','#88CCFF','#AADDFF'],6,4);

      this.particles=csDrawParticles(this.particles);

      if(t>0.86){const fo=Math.min(1,(t-0.86)/0.1);ctx.fillStyle=`rgba(0,0,0,${fo})`;ctx.fillRect(0,0,CW,CH);}
      if(t>0.92)csDrawVictoryText(levelIdx,Math.min(1,(t-0.92)/0.08));
      this.tick++;if(this.tick>=DUR)this.finish();
    },
    finish(){csFinish();if(onDone)onDone();}
  };
}

function startOutroCutscene(levelIdx,onDone){
  if(levelIdx===0||levelIdx===3) csOutroFallExplode(levelIdx,onDone);
  else if(levelIdx===1) csOutroWampa(levelIdx,onDone);
  else if(levelIdx===2) csOutroRancor(levelIdx,onDone);
  else if(levelIdx===4) csOutroDeathStar(levelIdx,onDone);
  else if(levelIdx===5) csOutroSarlacc(levelIdx,onDone);
  else if(levelIdx===6) csOutroATST(levelIdx,onDone);
  else if(levelIdx===7) csOutroATAT(levelIdx,onDone);
  else if(levelIdx===8) csOutroMythosaur(levelIdx,onDone);
  else if(levelIdx===9) csOutroZillo(levelIdx,onDone);
  else csOutroFallExplode(levelIdx,onDone);
}

function doLose(r){
  // Guard — if already in lose/win phase, don't fire again
  if(G.phase==='lose'||G.phase==='win')return;
  if(sessionPowerups.extraLife&&!extraLifeUsed){
    extraLifeUsed=true;
    G.flash=.5;G.flashCol='rgba(0,200,100,.6)';
    showMsg('** EXTRA LIFE USED **<br><br>'+r+'<br><br><span style="color:#44FF88">Extra life absorbed the hit!</span>',[['CONTINUE',()=>startRound()]]);
    return;
  }
  // Lock everything immediately — cancel any pending retreats
  clearBolts();
  G.phase='lose';G.locked=true;G.highlightZone=-1;G._afterRetreat=null;
  G.flash=1;G.flashCol='rgba(150,0,0,.85)';
  if(dailyMode){
    dailyMode=false;
    dailyModifiers=[];
    recordDailyLoss();
    const{streak}=getDailyStreak();
    showMsg(
      `★ DAILY CHALLENGE FAILED<br><br>${r}<br><br>`+
      `<span style="color:#FF6666">Streak lost.</span>`+
      (streak>0?`<br><span style="color:#88AACC">Streak was: ${streak} day${streak!==1?'s':''}</span>`:''),
      [['TRY AGAIN',()=>{startDailyChallenge();}],['MAIN MENU',showMainMenu]]
    );
    return;
  }
  if(campaignMode){campaignLoseLife(r);return;}
  sndGameOver();
  showGameOverScreen(r);
}

function showGameOverScreen(reason){
  // Full canvas game over — plays as a CS-like state
  const DUR=280;
  const levelIdx=G.level;
  const coinsEarned=getCoins();
  const levelsCleared=levelIdx;
  const bestCombo=comboCount;
  CS={tick:0,duration:DUR,skippable:false,
    draw(){
      const t=this.tick/DUR;
      if(t>0.5)this.skippable=true;
      const lv=LEVELS[levelIdx],bg=lv.bgType;
      if(bg==='hoth'){drawBgHoth(0);}
      else if(bg==='rancor'){drawBgRancor(0);}
      else if(bg==='asteroid'){drawBgAsteroid();}
      else if(bg==='mandalore'){drawBgMandalore(0);}
      else if(bg==='trench'){drawBgTrench();}
      else if(bg==='endor'){drawBgEndor(0);}
      else if(bg==='coruscant'){drawBgCoruscant(0);}
      else{drawBgDesert(0);}
      // Dark red vignette
      const vig=Math.min(0.88,t*1.5);
      ctx.fillStyle=`rgba(80,0,0,${vig})`;ctx.fillRect(0,0,CW,CH);

      if(t>0.18){
        const a=Math.min(1,(t-0.18)/0.18);
        // MISSION FAILED
        ctx.save();
        ctx.globalAlpha=a;
        ctx.textAlign='center';
        ctx.font='bold 46px monospace';
        ctx.fillStyle='#CC0000';
        // Drop shadow
        ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText('MISSION FAILED',CW/2+3,CH*0.28+3);
        ctx.fillStyle='#FF2200';ctx.fillText('MISSION FAILED',CW/2,CH*0.28);
        // Underline
        ctx.strokeStyle='rgba(255,34,0,0.5)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(CW/2-160,CH*0.31);ctx.lineTo(CW/2+160,CH*0.31);ctx.stroke();
        ctx.restore();
      }

      if(t>0.32){
        const a=Math.min(1,(t-0.32)/0.15);
        ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
        // Reason
        ctx.font='13px monospace';ctx.fillStyle='#FF8888';
        ctx.fillText(reason,CW/2,CH*0.38);
        ctx.restore();
      }

      if(t>0.44){
        const a=Math.min(1,(t-0.44)/0.15);
        ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
        // Stats panel
        const pw=260,ph=90,px=CW/2-pw/2,py=CH*0.44;
        ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(px,py,pw,ph);
        ctx.strokeStyle='rgba(255,50,50,0.4)';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
        ctx.font='10px monospace';ctx.fillStyle='#88AACC';ctx.letterSpacing='1px';
        ctx.fillText('— MISSION REPORT —',CW/2,py+16);
        ctx.font='12px monospace';
        const stats=[
          ['LEVEL REACHED',`${levelIdx+1} — ${lv.name}`],
          ['COINS EARNED',`${coinsEarned}`],
          ['BEST COMBO',`${bestCombo}x`],
        ];
        stats.forEach(([k,v],i)=>{
          ctx.fillStyle='#667788';ctx.textAlign='left';ctx.fillText(k,px+14,py+34+i*18);
          ctx.fillStyle='#FFFFFF';ctx.textAlign='right';ctx.fillText(v,px+pw-14,py+34+i*18);
        });
        ctx.restore();
      }

      if(t>0.72){
        // Prompt to continue — pulsing
        const pulse=0.6+Math.sin(this.tick*0.15)*0.4;
        ctx.save();ctx.globalAlpha=pulse*Math.min(1,(t-0.72)/0.1);ctx.textAlign='center';
        ctx.font='11px monospace';ctx.fillStyle='#FFDD44';
        ctx.fillText('TAP TO CONTINUE',CW/2,CH*0.82);
        ctx.restore();
      }

      this.tick++;
      if(this.tick>=DUR) this._showMenu();
    },
    _showMenu(){
      csFinish();
      showMsg(`MISSION FAILED<br><br>${reason}`,[
        ['RETRY LEVEL',()=>startLevel(G.level)],
        ['LEVEL SELECT',showLevelSelect],
        ['MAIN MENU',showMainMenu]
      ]);
    },
    finish(){this._showMenu();}
  };
}

// Star Wars-style yellow text crawl on black starfield, click to skip

function csTextCrawl(lines, onDone, skippable){
  if(skippable===undefined) skippable=true; // default for non-level crawls
  const DUR = 1260; // ~21 seconds at 60fps
  const lineH = 22;
  const totalTextH = lines.length * lineH + CH;
  CS = {tick:0, duration:DUR, onDone, skippable:skippable,
    draw(){
      const t = this.tick / DUR;
      // Starfield
      ctx.fillStyle = '#000008'; ctx.fillRect(0,0,CW,CH);
      STARS.forEach(s=>{ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.s*P,s.s*P);});

      // Scroll text upward — starts below screen, scrolls up and off
      const scrollY = CH + 40 - t * (totalTextH + CH*0.3);

      ctx.save();
      // Perspective clip — only show text in middle strip with fade
      ctx.beginPath();ctx.rect(0,0,CW,CH);ctx.clip();

      lines.forEach((line,i)=>{
        const y = scrollY + i * lineH;
        if(y < -lineH || y > CH + lineH) return;

        // Fade edges of screen
        const edgeFade = Math.min(1, Math.min(y/60, (CH-y)/60));
        if(edgeFade <= 0) return;

        ctx.globalAlpha = Math.max(0, edgeFade);
        ctx.textAlign = 'center';

        if(line.type === 'title'){
          ctx.fillStyle = '#FFDD44';
          ctx.font = 'bold 20px monospace';
          ctx.fillText(line.text, CW/2, y);
        } else if(line.type === 'sub'){
          ctx.fillStyle = '#88AACC';
          ctx.font = '11px monospace';
          ctx.letterSpacing = '2px';
          ctx.fillText(line.text, CW/2, y);
        } else if(line.type === 'blank'){
          // nothing
        } else {
          ctx.fillStyle = '#FFDD44';
          ctx.font = '13px monospace';
          ctx.fillText(line.text, CW/2, y);
        }
        ctx.globalAlpha = 1;
      });

      ctx.restore();

      // Hint text at bottom
      if(t > 0.1){
        ctx.globalAlpha = Math.min(0.4, (t-0.1)*2);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.skippable ? 'CLICK TO SKIP' : 'WATCH TO CONTINUE', CW/2, CH - 10);
        ctx.globalAlpha = 1;
      }

      this.tick++;
      if(this.tick >= DUR) this.finish();
    },
    finish(){csFinish(); if(onDone) onDone();}
  };
}

// ===================== DAILY CHALLENGE =====================
function getDailySeed(){
  const d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function seededRand(seed){
  let s=seed;
  return ()=>{s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/0xFFFFFFFF;};
}
function getDailyChallenge(){
  const seed=getDailySeed();
  const rng=seededRand(seed);
  const levelIdx=Math.floor(rng()*Math.min(10,highestUnlocked+1));
  const modifiers=[];
  if(rng()>0.5) modifiers.push('FAST');
  if(rng()>0.6) modifiers.push('2SHOTS');
  if(rng()>0.7) modifiers.push('NODMG');
  return{levelIdx,modifiers,seed};
}

// Daily state — fully isolated from coins/hunt/unlocks
let dailyMode=false;
let dailyModifiers=[];

// Daily streak stored in localStorage under its own key
function getDailyData(){
  try{return JSON.parse(localStorage.getItem('spaceHunterDaily'))||{};}catch(e){return{};}
}
function saveDailyData(d){
  try{localStorage.setItem('spaceHunterDaily',JSON.stringify(d));}catch(e){}
}
function getDailyStreak(){
  const d=getDailyData();
  return{streak:d.streak||0,lastWin:d.lastWin||0,longestStreak:d.longestStreak||0};
}
function recordDailyWin(){
  const today=getDailySeed();
  const d=getDailyData();
  // Only count once per day
  if(d.lastWin===today)return;
  const yesterday=getDailySeed()-1; // close enough for streak purposes
  const streak=(d.lastWin===yesterday||d.lastWin===today-1)?(d.streak||0)+1:1;
  d.streak=streak;
  d.lastWin=today;
  d.longestStreak=Math.max(d.longestStreak||0,streak);
  saveDailyData(d);
}
function recordDailyLoss(){
  const today=getDailySeed();
  const d=getDailyData();
  if(d.lastWin===today)return; // already won today, don't break streak
  d.streak=0;
  saveDailyData(d);
}
function hasDoneToday(){
  const d=getDailyData();
  return d.lastWin===getDailySeed();
}

function startDailyChallenge(){
  const ch=getDailyChallenge();
  if(ch.levelIdx>highestUnlocked){
    showMsg('You need to unlock more levels first!<br><br>Complete more levels in Hunt mode.',[['OK',showMainMenu]]);
    return;
  }
  const{streak,lastWin,longestStreak}=getDailyStreak();
  const today=getDailySeed();
  const doneToday=lastWin===today;
  const modText=ch.modifiers.length
    ?'Modifiers: <span style="color:#FF8844">'+ch.modifiers.join(' · ')+'</span>'
    :'No modifiers — pure skill.';
  const streakColor=streak>=7?'#FFD700':streak>=3?'#FF8844':'#88CCFF';
  const streakLine=streak>0
    ?`<br><span style="color:${streakColor}">🔥 Current streak: ${streak} day${streak!==1?'s':''}</span>`
    :'';
  const longestLine=longestStreak>1?`<br><span style="color:#667788;font-size:10px">Best streak: ${longestStreak} days</span>`:'';
  const doneNote=doneToday?'<br><br><span style="color:#44FF88">✓ Completed today — play again for fun</span>':'';

  showMsg(
    `<b style="color:#FFDD44;font-size:14px">★ DAILY CHALLENGE</b><br><br>`+
    `Today's Hunt: <b>Level ${ch.levelIdx+1}</b><br>${modText}`+
    streakLine+longestLine+doneNote+
    `<br><br><span style="color:#88AACC;font-size:9px">Seed: ${ch.seed} · Isolated from Hunt progress</span>`,
    [['ACCEPT',()=>{
      hideMsg();
      dailyMode=true;
      dailyModifiers=ch.modifiers;
      startLevel(ch.levelIdx);
    }],
    ['BACK',showMainMenu]]
  );
}

function getSave(){
  const d=loadSave();
  if(!d.coins)d.coins=0;
  if(!d.owned)d.owned={};
  if(!d.equipped)d.equipped={cursor:'default',effect:'sparks',wskin:'default'};

// --- Damage effects ---
function doHitEffect(x,y){
  const eq=getSave().equipped.effect;
  if(eq==='green'){
    // Neon green burst
    addParticles(x,y,'#00FF44',20);addParticles(x,y,'#AAFFCC',12);addParticles(x,y,'#00CC33',8);
  } else if(eq==='blue'){
    // Electric blue burst
    addParticles(x,y,'#2288FF',20);addParticles(x,y,'#88CCFF',12);addParticles(x,y,'#FFFFFF',6);
  } else if(eq==='bigexp'){
    // Big explosion — lots of large fast particles + shockwave via extra particles in all directions
    addParticles(x,y,'#FF6600',30);addParticles(x,y,'#FFDD00',24);
    addParticles(x,y,'#FF2200',20);addParticles(x,y,'#FFFFFF',14);
    addParticles(x,y,'#FF8800',18);
    // Extra ring of slow outward particles for shockwave feel
    for(let i=0;i<20;i++){
      const a=i/20*Math.PI*2,s=5+Math.random()*3;
      G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.7,col:'#FFAA44',r:P*2});
    }
    G.shake=Math.max(G.shake,14);
  } else if(eq==='disintegrate'){
    // Disintegration — many tiny slow particles drift upward and fade slowly
    for(let i=0;i<40;i++){
      const a=Math.random()*Math.PI*2;
      const s=0.3+Math.random()*1.2;
      const cols=['#AAAAAA','#888888','#CCCCCC','#666666','#444444'];
      G.particles.push({
        x:x+(Math.random()-0.5)*40,
        y:y+(Math.random()-0.5)*40,
        vx:Math.cos(a)*s*0.4,
        vy:-0.5-Math.random()*1.5, // drift upward
        life:1,
        col:cols[Math.floor(Math.random()*cols.length)],
        r:P
      });
    }
  } else {
    // default sparks
    addParticles(x,y,'#FF5500',16);addParticles(x,y,'#FFDD00',10);
  }
}
